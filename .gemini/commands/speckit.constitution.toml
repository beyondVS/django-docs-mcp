description = "대화형 또는 제공된 원칙 입력을 바탕으로 프로젝트 헌법을 생성하거나 업데이트하며, 모든 관련 템플릿이 동기화되도록 보장합니다."

prompt = """
---
description: 대화형 또는 제공된 원칙 입력을 바탕으로 프로젝트 헌법을 생성하거나 업데이트하며, 모든 관련 템플릿이 동기화되도록 보장합니다.
handoffs:
  - label: 명세 구축 (Build Specification)
    agent: speckit.specify
    prompt: 업데이트된 헌법을 바탕으로 기능 명세를 구현해 주세요. 다음을 빌드하고 싶습니다...
---

## 사용자 입력

```text
$ARGUMENTS
```

진행하기 전에 사용자 입력이 비어 있지 않다면 반드시 고려해야 합니다.

## 개요

귀하는 `.specify/memory/constitution.md`에 있는 프로젝트 헌법을 업데이트하고 있습니다. 이 파일은 대괄호로 둘러싸인 플레이스홀더 토큰(예: `[PROJECT_NAME]`, `[PRINCIPLE_1_NAME]`)을 포함하는 템플릿입니다. 귀하의 작업은 (a) 구체적인 값을 수집/도출하고, (b) 템플릿을 정확하게 채우고, (c) 수정 사항을 관련 아티팩트 전체에 전파하는 것입니다.

**참고**: `.specify/memory/constitution.md`가 아직 존재하지 않는 경우, 프로젝트 설정 중에 `.specify/templates/constitution-template.md`에서 초기화되었어야 합니다. 만약 누락되었다면 먼저 템플릿을 복사하십시오.

다음 실행 흐름을 따르십시오:

1. `.specify/memory/constitution.md`에 있는 기존 헌법을 로드합니다.
   - `[ALL_CAPS_IDENTIFIER]` 형식의 모든 플레이스홀더 토큰을 식별합니다.
   **중요**: 사용자는 템플릿에 사용된 것보다 적거나 많은 원칙을 요구할 수 있습니다. 특정 숫자가 지정된 경우 이를 준수하여 일반 템플릿을 따르되, 그에 맞게 문서를 업데이트하십시오.

2. 플레이스홀더를 위한 값을 수집/도출합니다:
   - 사용자 입력(대화)에서 값을 제공하면 이를 사용합니다.
   - 그렇지 않으면 기존 저장소 컨텍스트(README, 문서, 이전 헌법 버전 등)에서 추론합니다.
   - 거버넌스 날짜: `RATIFICATION_DATE`는 최초 채택일입니다(모르는 경우 질문하거나 TODO로 표시). `LAST_AMENDED_DATE`는 변경 사항이 있는 경우 오늘 날짜로 하고, 그렇지 않으면 이전 날짜를 유지합니다.
   - `CONSTITUTION_VERSION`은 시맨틱 버저닝 규칙에 따라 증가해야 합니다:
     - MAJOR: 하위 호환되지 않는 거버넌스/원칙 제거 또는 재정의.
     - MINOR: 새로운 원칙/섹션 추가 또는 실질적인 가이드 확장.
     - PATCH: 명확화, 문구 수정, 오타 교정, 비시맨틱 개선.
   - 버전 업 유형이 모호한 경우 확정하기 전에 근거를 제시하십시오.

3. 업데이트된 헌법 내용을 초안으로 작성합니다:
   - 모든 플레이스홀더를 구체적인 텍스트로 대체합니다(프로젝트에서 아직 정의하지 않기로 선택하여 의도적으로 남겨둔 슬롯을 제외하고는 대괄호 토큰이 남지 않아야 하며, 남겨둔 경우 명확한 근거를 제시해야 함).
   - 헤딩 계층 구조를 보존하고, 대체된 후에도 명확한 가이드를 제공하지 않는 주석은 제거할 수 있습니다.
   - 각 원칙(Principle) 섹션: 간결한 이름 라인, 타협할 수 없는 규칙을 담은 단락(또는 글머리 기호 목록), 명확하지 않은 경우 명시적인 근거(Rationale)를 포함합니다.
   - 거버넌스(Governance) 섹션: 수정 절차, 버저닝 정책, 준수 검토 기대 사항을 명시합니다.

4. 일관성 전파 체크리스트 (이전 체크리스트를 활성 유효성 검사로 전환):
   - `.specify/templates/plan-template.md`를 읽고 "헌법 확인(Constitution Check)" 또는 규칙이 업데이트된 원칙과 일치하는지 확인합니다.
   - `.specify/templates/spec-template.md`를 읽고 범위/요구사항 정렬을 확인합니다. 헌법에서 필수 섹션이나 제약 조건을 추가/제거한 경우 업데이트합니다.
   - `.specify/templates/tasks-template.md`를 읽고 작업 분류가 신규 또는 제거된 원칙 기반 작업 유형(예: 관측 가능성, 버저닝, 테스트 규율)을 반영하는지 확인합니다.
   - `.specify/templates/commands/*.md`에 있는 각 커맨드 파일(이 파일 포함)을 읽고, 일반적인 가이드가 필요한 곳에 특정 에이전트 이름(예: CLAUDE 등)과 같은 오래된 참조가 남아 있지 않은지 확인합니다.
   - 실행 가이드 문서(예: `README.md`, `docs/quickstart.md` 등)를 읽고 변경된 원칙에 대한 참조를 업데이트합니다.

5. 동기화 영향 보고서(Sync Impact Report) 생성 (업데이트 후 헌법 파일 상단에 HTML 주석으로 추가):
   - 버전 변경: 이전 → 이후
   - 수정된 원칙 목록 (이름이 변경된 경우 이전 제목 → 이후 제목)
   - 추가된 섹션
   - 제거된 섹션
   - 업데이트가 필요한 템플릿 (✅ 업데이트됨 / ⚠ 보류됨) 및 파일 경로
   - 의도적으로 미룬 플레이스홀더가 있는 경우 후속 TODO 항목.

6. 최종 출력 전 유효성 검사:
   - 설명되지 않은 대괄호 토큰이 남아 있지 않아야 함.
   - 버전 라인이 보고서와 일치해야 함.
   - 날짜는 ISO 형식(YYYY-MM-DD)이어야 함.
   - 원칙은 선언적이고 테스트 가능하며 모호한 언어가 없어야 함 ("should" → 적절한 경우 MUST/SHOULD 근거로 대체).

7. 완성된 헌법을 `.specify/memory/constitution.md`에 다시 씁니다 (덮어쓰기).

8. 사용자에게 다음을 포함한 최종 요약을 출력합니다:
   - 새 버전 및 업그레이드 근거.
   - 수동 후속 작업이 필요한 파일들.
   - 권장 커밋 메시지 (예: `docs: 헌법을 vX.Y.Z로 수정 (원칙 추가 및 거버넌스 업데이트)`).

포맷 및 스타일 요구사항:
- 템플릿과 정확히 동일한 마크다운 헤딩을 사용하십시오 (레벨을 임의로 변경하지 마십시오).
- 가독성을 위해 긴 근거 라인은 줄바꿈하되(가급적 100자 미만), 부자연스러운 끊김이 생기지 않도록 하십시오.
- 섹션 사이에는 빈 줄을 하나씩 둡니다.
- 행 끝의 공백을 피하십시오.

사용자가 부분적인 업데이트(예: 원칙 하나만 수정)를 제공하더라도 유효성 검사 및 버전 결정 단계를 수행하십시오.
중요 정보가 누락된 경우(예: 제정일을 정말 모르는 경우) `TODO(<FIELD_NAME>): 설명`을 삽입하고 동기화 영향 보고서의 보류 항목에 포함하십시오.

새 템플릿을 만들지 마십시오. 항상 기존의 `.specify/memory/constitution.md` 파일에서 작업하십시오.
"""
