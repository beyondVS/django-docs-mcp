description = "대화형 또는 제공된 원칙 입력을 바탕으로 프로젝트 헌법을 생성하거나 업데이트하며, 모든 의존 템플릿의 동기화를 유지합니다."

prompt = """
---
description: 대화형 또는 제공된 원칙 입력을 바탕으로 프로젝트 헌법을 생성하거나 업데이트하며, 모든 의존 템플릿의 동기화를 유지합니다.
handoffs:
  - label: 명세 생성
    agent: speckit.specify
    prompt: 업데이트된 헌법을 바탕으로 기능 명세서를 구현합니다. 구현하고 싶은 기능은...
---

## 사용자 입력

```text
$ARGUMENTS
```

사용자 입력이 있는 경우, 진행하기 전에 이를 **반드시** 고려해야 합니다.

## 개요

귀하는 `.specify/memory/constitution.md`에 있는 프로젝트 헌법을 업데이트하고 있습니다. 이 파일은 대괄호로 둘러싸인 플레이스홀더 토큰(예: `[PROJECT_NAME]`, `[PRINCIPLE_1_NAME]`)을 포함하는 템플릿입니다. 귀하의 역할은 (a) 구체적인 값을 수집/도출하고, (b) 템플릿을 정확하게 채우며, (c) 변경 사항을 종속된 아티팩트들에 전파하는 것입니다.

참고: `.specify/memory/constitution.md`가 아직 존재하지 않는 경우, 프로젝트 설정 중에 `.specify/templates/constitution-template.md`에서 초기화되어야 합니다. 누락된 경우 템플릿을 먼저 복사하십시오.

다음 실행 흐름을 따르십시오:

1. `.specify/memory/constitution.md`에 있는 기존 헌법을 로드합니다.
   - `[ALL_CAPS_IDENTIFIER]` 형식의 모든 플레이스홀더 토큰을 식별합니다.
   - 사용자가 템플릿보다 많거나 적은 원칙을 요구할 수 있습니다. 지정된 숫자가 있다면 이를 존중하여 문서를 업데이트하십시오.

2. 플레이스홀더에 들어갈 값 수집/도출:
   - 사용자 입력(대화)에 값이 있다면 이를 사용합니다.
   - 그렇지 않으면 기존 저장소 문맥(README, 문서, 이전 헌법 버전 등)에서 유추합니다.
   - 거버넌스 날짜: `RATIFICATION_DATE`(비준일)는 최초 채택일입니다. `LAST_AMENDED_DATE`(최종 수정일)는 변경 사항이 발생한 오늘 날짜로 설정합니다.
   - `CONSTITUTION_VERSION`(헌법 버전)은 시맨틱 버저닝 규칙에 따라 증가시킵니다 (MAJOR: 파괴적 변경, MINOR: 원칙 추가, PATCH: 문구 수정).

3. 업데이트된 헌법 초안 작성:
   - 모든 플레이스홀더를 구체적인 텍스트로 교체합니다.
   - 제목 계층 구조를 유지하고, 교체된 후의 주석은 제거할 수 있습니다.
   - 각 원칙 섹션에는 간결한 명칭, 협상 불가능한 규칙을 담은 단락(또는 목록), 명확하지 않은 경우 명시적인 근거를 포함합니다.

4. 일관성 전파 체크리스트 (수정된 원칙에 따라 다음 템플릿들을 확인 및 업데이트):
   - `.specify/templates/plan-template.md`: "헌법 준수 확인" 규칙 동기화
   - `.specify/templates/spec-template.md`: 필수 섹션이나 제약 사항 동기화
   - `.specify/templates/tasks-template.md`: 원칙 기반 작업 유형(관측 가능성, 테스트 규율 등) 반영
   - `.specify/templates/commands/*.md`: Generic 가이드라인 확인
   - `README.md` 또는 `docs/quickstart.md`: 원칙 참조 업데이트

5. 동기화 영향 보고서(Sync Impact Report) 생성:
   - 헌법 파일 최상단에 HTML 주석으로 작성합니다.
   - 버전 변경 사항, 수정된 원칙 목록, 추가/제거된 섹션, 업데이트가 필요한 템플릿 상태 등을 포함합니다.

6. 최종 검증 및 저장:
   - 설명되지 않은 대괄호 토큰이 남아 있지 않은지 확인합니다.
   - 날짜는 ISO 형식(YYYY-MM-DD)을 사용합니다.
   - 원칙은 선언적이고 테스트 가능하며 모호하지 않아야 합니다.
   - 최종 내용을 `.specify/memory/constitution.md`에 덮어씁니다.

7. 사용자에게 요약을 보고합니다:
   - 새 버전 및 버전 증가 근거
   - 수동 확인이 필요한 파일들
   - 권장 커밋 메시지 (예: `docs: 헌법을 vX.Y.Z로 개정 (원칙 추가 및 거버넌스 업데이트)`)
"""
