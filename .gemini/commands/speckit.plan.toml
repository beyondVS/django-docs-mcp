## 사용자 입력

```text
$ARGUMENTS
```

사용자 입력이 있는 경우, 진행하기 전에 이를 **반드시** 고려해야 합니다.

## 개요

1. **설정**: 저장소 루트에서 다음 명령어를 실행하여 `FEATURE_SPEC`, `IMPL_PLAN`, `SPECS_DIR`, `BRANCH` 정보를 JSON으로 파싱합니다.
   - **Windows (PowerShell):** `.specify/scripts/powershell/setup-plan.ps1 -Json`
   - **Linux/macOS (Bash):** `.specify/scripts/bash/setup-plan.sh --json`

2. **문맥 로드**: `FEATURE_SPEC`과 `.specify/memory/constitution.md`를 읽습니다. 이미 복사된 `IMPL_PLAN` 템플릿을 로드합니다.

3. **계획 워크플로우 실행**: `IMPL_PLAN` 템플릿의 구조에 따라 다음을 수행합니다:
   - 기술적 문맥(Technical Context) 작성 (알 수 없는 부분은 "확인 필요"로 표시)
   - 헌법 준수 확인(Constitution Check) 섹션 작성
   - 게이트 평가 (정당화되지 않은 위반 사항이 있으면 에러 처리)
   - 0단계: `research.md` 생성 ("확인 필요" 항목 모두 해결)
   - 1단계: `data-model.md`, `contracts/`, `quickstart.md` 생성
   - 1단계: 에이전트 스크립트를 실행하여 에이전트 컨텍스트 업데이트
   - 설계 후 헌법 준수 확인 재평가

4. **중단 및 보고**: 2단계 계획 수립 후 명령을 종료합니다. 브랜치, `IMPL_PLAN` 경로 및 생성된 결과물을 보고합니다.

## 단계(Phases)

### 0단계: 개요 및 리서치

1. **기술적 문맥에서 알 수 없는 항목 추출**:
   - 각 "확인 필요" 항목 → 리서치 작업
   - 각 의존성 → 베스트 프랙티스 확인 작업
   - 각 통합 항목 → 패턴 확인 작업

2. **리서치 수행 및 `research.md` 작성**:
   - 결정: [선택된 내용]
   - 근거: [선택 이유]
   - 고려된 대안: [함께 검토된 다른 방안]

**결과물**: 모든 "확인 필요" 항목이 해결된 `research.md`

### 1단계: 설계 및 계약(Contracts)

**선행 조건:** `research.md` 완료

1. **기능 명세에서 엔티티 추출** → `data-model.md`:
   - 엔티티 이름, 필드, 관계
   - 요구 사항에 따른 유효성 검사 규칙
   - 해당되는 경우 상태 전이 도식화

2. **인터페이스 계약 정의** (프로젝트에 외부 인터페이스가 있는 경우) → `/contracts/`:
   - 프로젝트가 사용자나 다른 시스템에 노출하는 인터페이스 식별
   - 프로젝트 유형에 적합한 계약 형식 문서화 (예: 라이브러리용 공개 API, CLI 도구용 커맨드 스키마, 웹 서비스용 엔드포인트 등)

3. **에이전트 컨텍스트 업데이트**:
   - 다음 스크립트 실행 (OS에 따라 선택):
     - **Windows (PowerShell):** `.specify/scripts/powershell/update-agent-context.ps1 -AgentType gemini`
     - **Linux/macOS (Bash):** `.specify/scripts/bash/update-agent-context.sh gemini`
   - 현재 사용 중인 AI 에이전트를 감지하고 적절한 컨텍스트 파일을 업데이트합니다.

**결과물**: data-model.md, /contracts/*, quickstart.md, 에이전트별 파일

## 주요 규칙

- 절대 경로를 사용하십시오.
- 게이트 실패나 해결되지 않은 명확화 사항이 있는 경우 에러를 발생시키십시오.
"""
