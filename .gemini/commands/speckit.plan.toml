description = "계획 템플릿을 사용하여 설계 아티팩트를 생성하는 구현 계획 워크플로우를 실행합니다."

prompt = """
---
description: 계획 템플릿을 사용하여 설계 아티팩트를 생성하는 구현 계획 워크플로우를 실행합니다.
handoffs:
  - label: 작업 생성 (Create Tasks)
    agent: speckit.tasks
    prompt: 계획을 작업으로 분해해 주세요.
    send: true
  - label: 체크리스트 생성 (Create Checklist)
    agent: speckit.checklist
    prompt: 다음 도메인에 대한 체크리스트를 생성해 주세요...
---

## 사용자 입력

```text
$ARGUMENTS
```

진행하기 전에 사용자 입력이 비어 있지 않다면 반드시 고려해야 합니다.

## 개요 (Outline)

1. **설정**: 현재 운영체제에 맞는 설정 스크립트를 저장소 루트에서 실행하고 `FEATURE_SPEC`, `IMPL_PLAN`, `SPECS_DIR`, `BRANCH`에 대한 JSON을 파싱합니다:
   - **Windows (win32)**: `.specify/scripts/powershell/setup-plan.ps1 -Json`
   - **그 외 (Linux/macOS)**: `.specify/scripts/bash/setup-plan.sh --json`

   인자(args)에 "I'm Groot"와 같은 단일 인용구가 있는 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표 사용: "I'm Groot").

2. **컨텍스트 로드**: `FEATURE_SPEC`과 `.specify/memory/constitution.md`를 읽습니다. (이미 복사된) `IMPL_PLAN` 템플릿을 로드합니다.

3. **계획 워크플로우 실행**: `IMPL_PLAN` 템플릿의 구조에 따라 다음을 수행합니다:
   - 기술 컨텍스트(Technical Context) 작성 (알 수 없는 부분은 "명확화 필요(NEEDS CLARIFICATION)"로 표시)
   - 헌법에서 헌법 확인(Constitution Check) 섹션 작성
   - 게이트(Gates) 평가 (정당화되지 않은 위반 사항이 있으면 에러 발생)
   - 0단계: `research.md` 생성 (모든 "명확화 필요" 사항 해결)
   - 1단계: `data-model.md`, `contracts/`, `quickstart.md` 생성
   - 1단계: 에이전트 스크립트를 실행하여 에이전트 컨텍스트 업데이트
   - 설계 후 헌법 확인 재평가

4. **중단 및 보고**: 명령은 2단계 계획 후에 종료됩니다. 브랜치명, `IMPL_PLAN` 경로 및 생성된 아티팩트를 보고합니다.

## 단계 (Phases)

### 0단계: 개요 및 조사 (Outline & Research)

1. 위 기술 컨텍스트에서 **알 수 없는 사항 추출**:
   - 각 "명확화 필요" 사항 → 조사 작업(research task)
   - 각 종속성 → 베스트 프랙티스 작업
   - 각 통합 사항 → 패턴 작업

2. **조사 에이전트 생성 및 파견**:

   ```text
   기술 컨텍스트의 각 미지수(unknown)에 대해:
     작업: "{feature context}에 대한 {unknown} 조사"
   각 기술 선택에 대해:
     작업: "{domain}에서의 {tech} 베스트 프랙티스 찾기"
   ```

3. 다음 형식을 사용하여 **결과를 `research.md`에 통합**:
   - 결정(Decision): [선택된 내용]
   - 근거(Rationale): [선택 이유]
   - 고려된 대안(Alternatives considered): [평가된 다른 방안들]

**결과물**: 모든 "명확화 필요" 사항이 해결된 `research.md`

### 1단계: 설계 및 컨트랙트 (Design & Contracts)

**전제 조건:** `research.md` 완료

1. **기능 명세에서 엔티티 추출** → `data-model.md`:
   - 엔티티 이름, 필드, 관계
   - 요구사항에 따른 유효성 검사 규칙
   - 해당되는 경우 상태 전이(State transitions)

2. **인터페이스 컨트랙트 정의** (프로젝트에 외부 인터페이스가 있는 경우) → `/contracts/`:
   - 프로젝트가 사용자 또는 다른 시스템에 노출하는 인터페이스 식별
   - 프로젝트 유형에 적합한 컨트랙트 형식 문서화
   - 예: 라이브러리용 공개 API, CLI 도구용 커맨드 스키마, 웹 서비스용 엔드포인트, 파서용 문법, 애플리케이션용 UI 컨트랙트
   - 순수하게 내부적인 프로젝트(빌드 스크립트, 일회성 도구 등)인 경우 건너뜀

3. **에이전트 컨텍스트 업데이트**:
   - 현재 운영체제에 맞는 업데이트 스크립트를 실행합니다:
     - **Windows (win32)**: `.specify/scripts/powershell/update-agent-context.ps1 -AgentType gemini`
     - **그 외 (Linux/macOS)**: `.specify/scripts/bash/update-agent-context.sh gemini`
   - 이 스크립트는 어떤 AI 에이전트가 사용 중인지 감지합니다.
   - 적절한 에이전트별 컨텍스트 파일을 업데이트합니다.
   - 현재 계획에서 추가된 새로운 기술만 추가합니다.
   - 마커 사이의 수동 추가 사항을 보존합니다.

**결과물**: `data-model.md`, `/contracts/*`, `quickstart.md`, 에이전트별 파일

## 주요 규칙

- 절대 경로 사용
- 게이트 실패 또는 해결되지 않은 명확화 사항이 있으면 에러(ERROR) 발생
"""
