prompt = """
---
description: 기존 작업을 설계 결과물을 바탕으로 실행 가능하고 의존성 순서가 정렬된 GitHub 이슈로 변환합니다.
tools: ['github/github-mcp-server/issue_write']
---

## 사용자 입력

```text
$ARGUMENTS
```

사용자 입력이 있는 경우, 진행하기 전에 이를 **반드시** 고려해야 합니다.

## 개요

1. 저장소 루트에서 다음 명령어를 실행하여 `FEATURE_DIR` 및 `AVAILABLE_DOCS` 목록을 JSON으로 파싱합니다.
   - **Windows (PowerShell):** `.specify/scripts/powershell/check-prerequisites.ps1 -Json -RequireTasks -IncludeTasks`
   - **Linux/macOS (Bash):** `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks`

2. 실행된 스크립트 결과에서 **tasks.md** 경로를 추출합니다.

3. 다음 명령어를 실행하여 Git 원격 저장소 주소를 가져옵니다:

```bash
git config --get remote.origin.url
```

> [!CAUTION]
> 원격 저장소 주소가 GITHUB URL인 경우에만 다음 단계를 진행하십시오.

4. 목록의 각 작업에 대해 GitHub MCP 서버를 사용하여 해당 저장소에 새로운 이슈를 생성합니다.

> [!CAUTION]
> 어떠한 경우에도 원격 저장소 URL과 일치하지 않는 저장소에는 이슈를 생성하지 마십시오.
"""
