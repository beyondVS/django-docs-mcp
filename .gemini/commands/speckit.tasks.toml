description = "설계 결과물을 바탕으로 기능 구현을 위한 실행 가능하고 의존성 순서가 정렬된 tasks.md를 생성합니다."

prompt = """
---
description: 설계 결과물을 바탕으로 기능 구현을 위한 실행 가능하고 의존성 순서가 정렬된 tasks.md를 생성합니다.
handoffs:
  - label: 일관성 분석
    agent: speckit.analyze
    prompt: 프로젝트의 일관성을 위해 분석을 실행합니다.
    send: true
  - label: 프로젝트 구현
    agent: speckit.implement
    prompt: 단계별 구현을 시작합니다.
    send: true
---

## 사용자 입력

```text
$ARGUMENTS
```

사용자 입력이 있는 경우, 진행하기 전에 이를 **반드시** 고려해야 합니다.

## 사전 실행 확인

**확장 훅(Extension Hooks) 확인**:
- 프로젝트 루트에 `.specify/extensions.yml`이 있는지 확인합니다.
- 존재하는 경우 `hooks.before_tasks` 항목을 확인하고 활성화된 훅을 실행합니다.

## 개요

1. **설정**: 저장소 루트에서 다음 명령어를 실행하여 `FEATURE_DIR` 및 `AVAILABLE_DOCS` 목록을 JSON으로 파싱합니다.
   - **Windows (PowerShell):** `.specify/scripts/powershell/check-prerequisites.ps1 -Json`
   - **Linux/macOS (Bash):** `.specify/scripts/bash/check-prerequisites.sh --json`
   - 모든 경로는 절대 경로여야 합니다.

2. **설계 문서 로드**: `FEATURE_DIR`에서 다음 문서를 읽습니다.
   - **필수**: `plan.md` (기술 스택, 라이브러리, 구조), `spec.md` (우선순위가 지정된 사용자 스토리)
   - **선택**: `data-model.md`, `contracts/`, `research.md`, `quickstart.md`

3. **작업 생성 워크플로우 실행**:
   - 사용자 스토리별로 정리된 작업을 생성합니다.
   - 사용자 스토리 완료 순서를 보여주는 의존성 그래프를 생성합니다.
   - 사용자 스토리별 병렬 실행 예시를 만듭니다.
   - 작업의 완결성을 검증합니다.

4. **tasks.md 생성**: `.specify/templates/tasks-template.md`를 구조로 사용하여 다음 내용을 채웁니다:
   - `plan.md`의 정확한 기능 이름
   - 1단계: 설정 작업 (프로젝트 초기화)
   - 2단계: 기초 작업 (모든 사용자 스토리의 블로킹 선행 조건)
   - 3단계+: 사용자 스토리별 단계 (우선순위 순서)
   - 최종 단계: 다듬기 및 횡단 관심사
   - 모든 작업은 엄격한 체크리스트 형식을 따라야 합니다.

5. **보고**: 생성된 `tasks.md` 경로와 요약을 출력합니다.

6. **확장 훅 확인**: `tasks.md` 생성 후 `hooks.after_tasks` 훅이 있는지 확인하고 실행합니다.

## 작업 생성 규칙

**중요**: 독립적인 구현과 테스트가 가능하도록 작업은 반드시 사용자 스토리별로 구성되어야 합니다.

**테스트는 선택 사항입니다**: 기능 명세에서 명시적으로 요청하거나 사용자가 TDD 방식을 요청한 경우에만 테스트 작업을 생성하십시오.

### 체크리스트 형식 (필수)

모든 작업은 반드시 다음 형식을 엄격히 따라야 합니다:

```text
- [ ] [TaskID] [P?] [Story?] 파일 경로를 포함한 설명
```

**형식 구성 요소**:

1. **체크박스**: 항상 `- [ ]`로 시작합니다.
2. **Task ID**: 실행 순서에 따른 일련번호 (T001, T002, T003...)
3. **[P] 마커**: 작업이 병렬화 가능한 경우에만 포함합니다 (다른 파일, 미완료 작업에 대한 의존성 없음).
4. **[Story] 레이블**: 사용자 스토리 단계 작업에만 필수입니다.
   - 형식: [US1], [US2], [US3] 등
5. **설명**: 정확한 파일 경로를 포함한 명확한 행동

**예시**:

- ✅ 올바름: `- [ ] T001 구현 계획에 따라 프로젝트 구조 생성`
- ✅ 올바름: `- [ ] T012 [P] [US1] src/models/user.py 에 User 모델 생성`
- ❌ 틀림: `- [ ] User 모델 생성` (ID 및 Story 레이블 누락)
- ❌ 틀림: `- [ ] T001 [US1] 모델 생성` (파일 경로 누락)
"""
