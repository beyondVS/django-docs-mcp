## 사용자 입력

```text
$ARGUMENTS
```

진행하기 전에 사용자 입력이 비어 있지 않다면 반드시 고려해야 합니다.

## 실행 전 체크 (Pre-Execution Checks)

**확장 훅 확인 (작업 생성 전)**:
- 프로젝트 루트에 `.specify/extensions.yml`이 있는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.before_tasks` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 자동으로 건너뛰고 정상적으로 진행합니다.
- `enabled: true`인 훅만 필터링합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 **마십시오**:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 해당 훅을 건너뛰고 조건 평가는 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
  - **선택적 훅** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 사전 훅**: {extension}
    명령: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 훅** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 사전 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}

    개요(Outline)로 진행하기 전에 훅 명령의 결과를 기다리십시오.
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 자동으로 건너뜁니다.

## 개요 (Outline)

1. **설정**: 현재 운영체제에 맞는 스크립트를 저장소 루트에서 실행하고 JSON을 파싱하여 `FEATURE_DIR` 및 `AVAILABLE_DOCS` 목록을 가져옵니다:
   - **Windows (win32)**: `.specify/scripts/powershell/check-prerequisites.ps1 -Json`
   - **그 외 (Linux/macOS)**: `.specify/scripts/bash/check-prerequisites.sh --json`

   모든 경로는 절대 경로여야 합니다. 인자(args)에 "I'm Groot"와 같은 단일 인용구가 있는 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표 사용: "I'm Groot").

2. **설계 문서 로드**: `FEATURE_DIR`에서 다음을 읽습니다:
   - **필수**: `plan.md` (기술 스택, 라이브러리, 구조), `spec.md` (우선순위가 포함된 사용자 스토리)
   - **선택**: `data-model.md` (엔티티), `contracts/` (인터페이스 컨트랙트), `research.md` (결정 사항), `quickstart.md` (테스트 시나리오)
   - 참고: 모든 프로젝트에 모든 문서가 있는 것은 아닙니다. 사용 가능한 문서를 바탕으로 작업을 생성하십시오.

3. **작업 생성 워크플로우 실행**:
   - `plan.md`를 로드하여 기술 스택, 라이브러리, 프로젝트 구조를 추출합니다.
   - `spec.md`를 로드하여 우선순위(P1, P2, P3 등)가 포함된 사용자 스토리를 추출합니다.
   - `data-model.md`가 있으면 엔티티를 추출하고 사용자 스토리에 매핑합니다.
   - `contracts/`가 있으면 인터페이스 컨트랙트를 사용자 스토리에 매핑합니다.
   - `research.md`가 있으면 설정 작업을 위한 결정 사항을 추출합니다.
   - 사용자 스토리별로 작업을 조직화합니다 (아래 '작업 생성 규칙' 참조).
   - 사용자 스토리 완료 순서를 보여주는 의존성 그래프를 생성합니다.
   - 사용자 스토리별 병렬 실행 예시를 만듭니다.
   - 작업 완전성을 검증합니다 (각 사용자 스토리에 필요한 모든 작업이 포함되었는지, 독립적으로 테스트 가능한지 확인).

4. **tasks.md 생성**: `.specify/templates/tasks-template.md` 구조를 사용하여 다음을 채웁니다:
   - `plan.md`에 명시된 올바른 기능 이름
   - 1단계: 설정 작업 (프로젝트 초기화)
   - 2단계: 기초 작업 (모든 사용자 스토리의 차단형 전제 조건)
   - 3단계 이상: 사용자 스토리당 하나의 단계 (`spec.md`의 우선순위 순서)
   - 각 단계 포함 사항: 스토리 목표, 독립적 테스트 기준, 테스트(요청된 경우), 구현 작업
   - 마지막 단계: 다듬기(Polish) 및 횡단 관심사(Cross-cutting concerns)
   - 모든 작업은 엄격한 체크리스트 형식을 따라야 합니다 (아래 '작업 생성 규칙' 참조).
   - 각 작업에 대해 명확한 파일 경로 명시
   - 스토리 완료 순서를 보여주는 의존성 섹션
   - 스토리별 병렬 실행 예시
   - 구현 전략 섹션 (MVP 우선, 점진적 배포)

5. **보고**: 생성된 `tasks.md` 경로와 요약을 출력합니다:
   - 총 작업 수
   - 사용자 스토리별 작업 수
   - 식별된 병렬 기회
   - 각 스토리의 독립적 테스트 기준
   - 제안하는 MVP 범위 (일반적으로 사용자 스토리 1)
   - 형식 검증: 모든 작업이 체크리스트 형식(체크박스, ID, 라벨, 파일 경로)을 따르는지 확인

6. **확장 훅 확인**: `tasks.md`가 생성된 후, 프로젝트 루트에 `.specify/extensions.yml`이 있는지 확인합니다.
   - 존재한다면 이를 읽고 `hooks.after_tasks` 키 아래의 항목을 찾습니다.
   - YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 자동으로 건너뛰고 정상적으로 진행합니다.
   - `enabled: true`인 훅만 필터링합니다.
   - 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 **마십시오**:
     - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
     - 훅에 비어 있지 않은 `condition`이 정의된 경우, 해당 훅을 건너뛰고 조건 평사는 HookExecutor 구현에 맡깁니다.
   - 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
     - **선택적 훅** (`optional: true`):
       ```
       ## 확장 훅 (Extension Hooks)

       **선택적 훅**: {extension}
       명령: `/{command}`
       설명: {description}

       프롬프트: {prompt}
       실행하려면: `/{command}`
       ```
     - **필수 훅** (`optional: false`):
       ```
       ## 확장 훅 (Extension Hooks)

       **자동 훅**: {extension}
       실행 중: `/{command}`
       EXECUTE_COMMAND: {command}
       ```
   - 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 자동으로 건너뜁니다.

작업 생성을 위한 컨텍스트: {{args}}

`tasks.md`는 즉시 실행 가능해야 합니다. 각 작업은 LLM이 추가 컨텍스트 없이 완료할 수 있을 만큼 구체적이어야 합니다.

## 작업 생성 규칙 (Task Generation Rules)

**중요**: 독립적인 구현과 테스트가 가능하도록 작업은 반드시 **사용자 스토리별로 조직화**되어야 합니다.

**테스트는 선택 사항입니다**: 기능 명세에서 명시적으로 요청하거나 사용자가 TDD 방식을 요청한 경우에만 테스트 작업을 생성하십시오.

### 체크리스트 형식 (필수)

모든 작업은 반드시 다음 형식을 엄격히 따라야 합니다:

```text
- [ ] [TaskID] [P?] [Story?] 파일 경로가 포함된 설명
```

**형식 구성 요소**:

1. **체크박스**: 항상 `- [ ]` (마크다운 체크박스)로 시작
2. **작업 ID**: 실행 순서에 따른 순차적 번호 (T001, T002, T003...)
3. **[P] 마커**: 작업이 병렬화 가능한 경우에만 포함 (다른 파일, 미완료 작업에 대한 종속성 없음)
4. **[Story] 라벨**: 사용자 스토리 단계의 작업에만 **필수**로 포함
   - 형식: [US1], [US2], [US3] 등 (`spec.md`의 사용자 스토리에 매핑)
   - 설정(Setup) 단계: 스토리 라벨 없음
   - 기초(Foundational) 단계: 스토리 라벨 없음
   - 사용자 스토리 단계: 반드시 스토리 라벨 포함
   - 다듬기(Polish) 단계: 스토리 라벨 없음
5. **설명**: 정확한 파일 경로가 포함된 명확한 동작

**예시**:

- ✅ 올바름: `- [ ] T001 구현 계획에 따라 프로젝트 구조 생성`
- ✅ 올바름: `- [ ] T005 [P] src/middleware/auth.py에 인증 미들웨어 구현`
- ✅ 올바름: `- [ ] T012 [P] [US1] src/models/user.py에 User 모델 생성`
- ✅ 올바름: `- [ ] T014 [US1] src/services/user_service.py에 UserService 구현`
- ❌ 잘못됨: `- [ ] User 모델 생성` (ID 및 스토리 라벨 누락)
- ❌ 잘못됨: `T001 [US1] 모델 생성` (체크박스 누락)
- ❌ 잘못됨: `- [ ] [US1] User 모델 생성` (작업 ID 누락)
- ❌ 잘못됨: `- [ ] T001 [US1] 모델 생성` (파일 경로 누락)

### 작업 조직화

1. **사용자 스토리 기반 (`spec.md`)** - 핵심 조직화 원칙:
   - 각 사용자 스토리(P1, P2, P3...)는 고유한 단계를 가집니다.
   - 모든 관련 컴포넌트를 해당 스토리에 매핑합니다:
     - 해당 스토리에 필요한 모델
     - 해당 스토리에 필요한 서비스
     - 해당 스토리에 필요한 인터페이스/UI
     - 테스트 요청 시: 해당 스토리에 특화된 테스트
   - 스토리 간 의존성을 표시합니다 (대부분의 스토리는 독립적이어야 함).

2. **컨트랙트(Contracts) 기반**:
   - 각 인터페이스 컨트랙트 → 해당 컨트랙트가 제공하는 사용자 스토리에 매핑
   - 테스트 요청 시: 각 인터페이스 컨트랙트 → 해당 스토리 단계의 구현 전 계약 테스트 작업 [P]

3. **데이터 모델 기반**:
   - 각 엔티티를 그것이 필요한 사용자 스토리에 매핑합니다.
   - 엔티티가 여러 스토리에서 사용되는 경우: 가장 빠른 스토리 또는 설정(Setup) 단계에 배치
   - 관계(Relationships) → 적절한 스토리 단계의 서비스 레이어 작업

4. **설정/인프라 기반**:
   - 공유 인프라 → 설정 단계 (1단계)
   - 기초/차단형 작업 → 기초 단계 (2단계)
   - 스토리별 설정 → 해당 스토리 단계 내부에 배치

### 단계 구조 (Phase Structure)

- **1단계**: 설정 (Setup - 프로젝트 초기화)
- **2단계**: 기초 (Foundational - 사용자 스토리 전에 완료해야 하는 전제 조건)
- **3단계 이상**: 우선순위 순서에 따른 사용자 스토리 (P1, P2, P3...)
  - 각 스토리 내: 테스트(요청 시) → 모델 → 서비스 → 엔드포인트 → 통합
  - 각 단계는 완전하고 독립적으로 테스트 가능한 증분이어야 함
- **마지막 단계**: 다듬기(Polish) 및 횡단 관심사
"""
