## 반면 교사: 하지 말아야 할 것

**❌ 잘못된 예 - 요구사항이 아닌 구현을 테스트함:**

```markdown
- [ ] CHK001 - 랜딩 페이지에 에피소드 카드 3개가 표시되는지 확인하십시오 [Spec §FR-001]
- [ ] CHK002 - 데스크톱에서 호버 상태가 올바르게 작동하는지 테스트하십시오 [Spec §FR-003]
- [ ] CHK003 - 로고 클릭 시 홈 페이지로 이동하는지 확정하십시오 [Spec §FR-010]
- [ ] CHK004 - 관련 에피소드 섹션에 3~5개의 항목이 표시되는지 체크하십시오 [Spec §FR-005]
```

**✅ 올바른 예 - 요구사항 품질을 테스트함:**

```markdown
- [ ] CHK001 - 추천 에피소드의 개수와 레이아웃이 명시적으로 지정되었습니까? [완전성, Spec §FR-001]
- [ ] CHK002 - 모든 상호작용 요소에 대해 호버 상태 요구사항이 일관되게 정의되었습니까? [일관성, Spec §FR-003]
- [ ] CHK003 - 클릭 가능한 모든 브랜드 요소에 대해 네비게이션 요구사항이 명확합니까? [명확성, Spec §FR-010]
- [ ] CHK004 - 관련 에피소드에 대한 선택 기준이 문서화되어 있습니까? [공백, Spec §FR-005]
- [ ] CHK005 - 비동기 에피소드 데이터에 대한 로딩 상태 요구사항이 정의되었습니까? [공백]
- [ ] CHK006 - "시각적 계층 구조" 요구사항을 객관적으로 측정할 수 있습니까? [측정 가능성, Spec §FR-001]
```

**주요 차이점:**
- 잘못된 예: 시스템이 올바르게 작동하는지 테스트
- 올바른 예: 요구사항이 올바르게 작성되었는지 테스트
- 잘못된 예: 동작의 확인(Verification)
- 올바른 예: 요구사항 품질의 타당성 확인(Validation)
- 잘못된 예: "X를 수행합니까?"
- 올바른 예: "X가 명확하게 명시되어 있습니까?"
