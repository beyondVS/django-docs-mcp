description = "사용자 요구 사항을 바탕으로 현재 기능에 대한 커스텀 체크리스트를 생성합니다."

prompt = """
---
description: 사용자 요구 사항을 바탕으로 현재 기능에 대한 커스텀 체크리스트를 생성합니다.
---

## 체크리스트의 목적: "요구 사항을 위한 유닛 테스트"

**핵심 개념**: 체크리스트는 **요구 사항 작성에 대한 유닛 테스트**입니다. 주어진 도메인에서 요구 사항의 품질, 명확성 및 완결성을 검증합니다.

**검증/테스트용이 아님**:
- ❌ "버튼이 올바르게 클릭되는지 확인"
- ❌ "에러 처리가 작동하는지 테스트"
- ❌ 코드가 명세와 일치하는지 확인하는 용도가 아님

**요구 사항 품질 검증용**:
- ✅ "모든 카드 유형에 대해 시각적 계층 구조 요구 사항이 정의되었는가?" (완결성)
- ✅ "'눈에 띄는 표시'가 구체적인 크기/위치로 정량화되었는가?" (명확성)
- ✅ "호버 상태 요구 사항이 모든 상호작용 요소에서 일관적인가?" (일관성)

## 사용자 입력

```text
$ARGUMENTS
```

## 실행 단계

1. **설정**: 저장소 루트에서 다음 명령어를 실행하여 `FEATURE_DIR` 및 `AVAILABLE_DOCS` 목록을 JSON으로 파싱합니다.
   - **Windows (PowerShell):** `.specify/scripts/powershell/check-prerequisites.ps1 -Json`
   - **Linux/macOS (Bash):** `.specify/scripts/bash/check-prerequisites.sh --json`

2. **의도 명확화 (동적)**: 사용자 문구와 명세/계획/작업에서 추출된 신호를 바탕으로 최대 3개의 질문을 던져 의도를 파악합니다.

3. **기능 문맥 로드**: `FEATURE_DIR`에서 `spec.md`, `plan.md`, `tasks.md`를 읽습니다.

4. **체크리스트 생성**:
   - `FEATURE_DIR/checklists/` 디렉토리를 생성합니다.
   - 도메인에 기반한 고유한 파일 이름을 생성합니다 (예: `ux.md`, `api.md`).
   - **핵심 원칙**: 요구 사항 자체를 테스트하십시오 (구현이 아님).
   - 모든 항목은 완결성, 명확성, 일관성, 측정 가능성, 커버리지를 평가해야 합니다.

5. **보고**: 체크리스트 파일 경로와 항목 수를 보고합니다.
"""
