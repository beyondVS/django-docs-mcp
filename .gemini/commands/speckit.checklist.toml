description = "사용자 요구사항을 바탕으로 현재 기능에 대한 맞춤형 체크리스트를 생성합니다."

prompt = """
---
description: 사용자 요구사항을 바탕으로 현재 기능에 대한 맞춤형 체크리스트를 생성합니다.
---

## 체크리스트의 목적: "영문(요구사항)을 위한 단위 테스트"

**핵심 개념**: 체크리스트는 **요구사항 작성을 위한 단위 테스트**입니다. 이는 특정 도메인에서 요구사항의 품질, 명확성 및 완전성을 검증합니다.

**구현 확인/테스트 용도가 아님**:
- ❌ "버튼이 올바르게 클릭되는지 확인" (구현 테스트)
- ❌ "에러 처리가 작동하는지 테스트" (기능 테스트)
- ❌ "API가 200을 반환하는지 확인" (통신 테스트)
- ❌ 코드/구현이 명세와 일치하는지 확인

**요구사항 품질 검증 용도**:
- ✅ "모든 카드 유형에 대해 시각적 계층 구조 요구사항이 정의되었는가?" (완전성)
- ✅ "'눈에 띄는 표시'가 구체적인 크기/위치로 수량화되었는가?" (명확성)
- ✅ "모든 상호작용 요소에서 호버 상태 요구사항이 일관된가?" (일관성)
- ✅ "키보드 네비게이션에 대한 접근성 요구사항이 정의되었는가?" (커버리지)
- ✅ "로고 이미지 로드 실패 시 어떤 일이 발생하는지 명세에서 정의하고 있는가?" (예외 케이스)

**비유**: 명세(Spec)가 영어로 작성된 코드라면, 체크리스트는 그 코드의 단위 테스트 스위트입니다. 구현이 작동하는지가 아니라, 요구사항이 잘 작성되었고, 완전하며, 모호하지 않고, 구현할 준비가 되었는지를 테스트하는 것입니다.

## 사용자 입력

```text
$ARGUMENTS
```

진행하기 전에 사용자 입력이 비어 있지 않다면 반드시 고려해야 합니다.

## 실행 단계

1. **설정**: 현재 운영체제에 맞는 스크립트를 저장소 루트에서 실행하고 JSON을 파싱하여 `FEATURE_DIR` 및 `AVAILABLE_DOCS` 목록을 가져옵니다.
   - **Windows (win32)**: `.specify/scripts/powershell/check-prerequisites.ps1 -Json`
   - **그 외 (Linux/macOS)**: `.specify/scripts/bash/check-prerequisites.sh --json`
   - 모든 파일 경로는 절대 경로여야 합니다.
   - 인자(args)에 "I'm Groot"와 같은 단일 인용구가 있는 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표 사용: "I'm Groot").

2. **의도 명확화 (동적)**: 최대 3개의 초기 문맥 질문을 도출합니다 (고정된 목록 없음). 질문은 다음 조건을 충족해야 합니다:
   - 사용자의 문구 + spec/plan/tasks에서 추출된 신호를 기반으로 생성됨
   - 체크리스트 내용에 실질적인 변화를 주는 정보만 질문함
   - `$ARGUMENTS`에서 이미 명확한 경우 개별적으로 건너뜀
   - 폭보다는 정밀도 우선

   생성 알고리즘:
   1. 신호 추출: 기능 도메인 키워드(예: auth, latency, UX, API), 위험 지표("critical", "must", "compliance"), 이해관계자 힌트("QA", "review", "security team"), 명시적 결과물("a11y", "rollback", "contracts").
   2. 신호를 관련성에 따라 순위가 매겨진 후보 집중 영역(최대 4개)으로 클러스터링.
   3. 명시되지 않은 경우 예상 독자 및 시기(작성자, 검토자, QA, 릴리스) 식별.
   4. 누락된 차원 탐지: 범위의 폭, 깊이/엄격함, 위험 강조, 제외 경계, 측정 가능한 수락 기준.
   5. 다음 원형에서 질문 구성:
      - 범위 정교화 (예: "X 및 Y와의 통합 접점을 포함해야 합니까, 아니면 로컬 모듈의 정확성으로 제한해야 합니까?")
      - 위험 우선순위 (예: "잠재적 위험 영역 중 필수 게이팅 체크를 받아야 하는 곳은 어디입니까?")
      - 깊이 보정 (예: "가벼운 프리커밋 정리 목록입니까, 아니면 공식 릴리스 게이트입니까?")
      - 독자 설정 (예: "작성자만 사용합니까, 아니면 PR 리뷰 중 동료들이 함께 사용합니까?")
      - 경계 제외 (예: "이번 라운드에서 성능 튜닝 항목을 명시적으로 제외할까요?")
      - 시나리오 클래스 공백 (예: "복구 흐름이 감지되지 않았습니다. 롤백/부분 실패 경로가 범위에 포함됩니까?")

   질문 형식 규칙:
   - 옵션을 제시하는 경우 '옵션 | 후보 | 중요한 이유' 열이 포함된 압축된 테이블 생성
   - 옵션은 최대 A~E로 제한; 자유 양식 답변이 더 명확한 경우 테이블 생략
   - 사용자가 이미 말한 내용을 다시 묻지 않음
   - 추측성 카테고리 금지(날조 금지). 불확실한 경우 "X가 범위에 포함되는지 확인해 주십시오"라고 명시적으로 질문

   상호작용이 불가능한 경우 기본값:
   - 깊이: 표준(Standard)
   - 독자: 코드 관련이면 검토자(PR), 그렇지 않으면 작성자
   - 집중 영역: 관련성 높은 상위 2개 클러스터

   질문을 출력합니다 (Q1/Q2/Q3 라벨 사용). 답변 후 2개 이상의 시나리오 클래스(대안/예외/복구/비기능 도메인)가 여전히 불명확한 경우, 각각 한 줄의 근거(예: "해결되지 않은 복구 경로 위험")와 함께 최대 2개의 추가 후속 질문(Q4/Q5)을 할 수 있습니다. 총 질문 수는 5개를 초과하지 마십시오. 사용자가 더 이상의 질문을 명시적으로 거부하면 중단하십시오.

3. **사용자 요청 이해**: `$ARGUMENTS` + 명확화 답변 결합:
   - 체크리스트 테마 도출 (예: 보안, 리뷰, 배포, UX)
   - 사용자가 언급한 명시적 필수 항목 통합
   - 선택된 집중 영역을 카테고리 구조에 매핑
   - spec/plan/tasks에서 누락된 컨텍스트 추론 (날조 금지)

4. **기능 컨텍스트 로드**: `FEATURE_DIR`에서 읽기:
   - spec.md: 기능 요구사항 및 범위
   - plan.md (존재하는 경우): 기술 세부 사항, 종속성
   - tasks.md (존재하는 경우): 구현 작업

   **컨텍스트 로딩 전략**:
   - 활성 집중 영역과 관련된 필요한 부분만 로드 (파일 전체 덤프 방지)
   - 긴 섹션은 간결한 시나리오/요구사항 글머리 기호로 요약 선호
   - 단계적 공개 사용: 공백이 감지된 경우에만 후속 검색 추가
   - 소스 문서가 큰 경우 원본 텍스트를 포함하는 대신 중간 요약 항목 생성

5. **체크리스트 생성** - "요구사항을 위한 단위 테스트" 작성:
   - `FEATURE_DIR/checklists/` 디렉토리가 없으면 생성
   - 고유한 체크리스트 파일명 생성:
     - 도메인에 기반한 짧고 설명적인 이름 사용 (예: `ux.md`, `api.md`, `security.md`)
     - 형식: `[domain].md`
   - 파일 처리 동작:
     - 파일이 **없는** 경우: 새 파일을 생성하고 CHK001부터 번호 매기기 시작
     - 파일이 **있는** 경우: 기존 파일에 새 항목을 추가하며, 마지막 CHK ID 다음부터 시작 (예: 마지막이 CHK015이면 CHK016부터 시작)
   - 기존 체크리스트 내용을 삭제하거나 교체하지 마십시오 - 항상 보존하고 추가하십시오.

   **핵심 원칙 - 구현이 아닌 요구사항을 테스트하십시오**:
   모든 체크리스트 항목은 **요구사항 자체**의 다음 사항을 평가해야 합니다:
   - **완전성 (Completeness)**: 필요한 모든 요구사항이 포함되어 있는가?
   - **명확성 (Clarity)**: 요구사항이 모호하지 않고 구체적인가?
   - **일관성 (Consistency)**: 요구사항들이 서로 정렬되어 있는가?
   - **측정 가능성 (Measurability)**: 요구사항을 객관적으로 검증할 수 있는가?
   - **커버리지 (Coverage)**: 모든 시나리오/예외 케이스가 다루어지는가?

   **카테고리 구조** - 요구사항 품질 차원별로 항목 그룹화:
   - **요구사항 완전성** (필요한 모든 요구사항이 문서화되었는가?)
   - **요구사항 명확성** (요구사항이 구체적이고 모호하지 않은가?)
   - **요구사항 일관성** (요구사항들이 충돌 없이 정렬되었는가?)
   - **수락 기준 품질** (성공 기준이 측정 가능한가?)
   - **시나리오 커버리지** (모든 흐름/케이스가 다루어지는가?)
   - **예외 케이스 커버리지** (경계 조건이 정의되었는가?)
   - **비기능 요구사항** (성능, 보안, 접근성 등이 명시되었는가?)
   - **종속성 및 가정** (문서화되고 검증되었는가?)
   - **모호성 및 충돌** (명확화가 필요한 부분은 무엇인가?)

   **체크리스트 항목 작성법 - "영문(요구사항)을 위한 단위 테스트"**:

   ❌ **잘못된 예** (구현 테스트):
   - "랜딩 페이지에 에피소드 카드 3개가 표시되는지 확인하십시오"
   - "데스크톱에서 호버 상태가 작동하는지 테스트하십시오"
   - "로고 클릭 시 홈으로 이동하는지 확인하십시오"

   ✅ **올바른 예** (요구사항 품질 테스트):
   - "추천 에피소드의 정확한 개수와 레이아웃이 명시되어 있습니까?" [완전성]
   - "'눈에 띄는 표시'가 구체적인 크기/위치로 수량화되었습니까?" [명확성]
   - "모든 상호작용 요소에서 호버 상태 요구사항이 일관되게 정의되었습니까?" [일관성]
   - "모든 상호작용 UI에 대해 키보드 네비게이션 요구사항이 정의되었습니까?" [커버리지]
   - "로고 이미지 로드 실패 시의 폴백 동작이 명시되었습니까?" [예외 케이스]
   - "비동기 에피소드 데이터에 대한 로딩 상태가 정의되었습니까?" [완전성]
   - "충돌하는 UI 요소들에 대한 시각적 계층 구조가 명세에서 정의되었습니까?" [명확성]

   **항목 구조**:
   각 항목은 다음 패턴을 따라야 합니다:
   - 요구사항 품질에 대해 묻는 질문 형식
   - spec/plan에 **작성된**(또는 작성되지 않은) 내용에 집중
   - 대괄호 안에 품질 차원 포함 `[완전성/명확성/일관성/등]`
   - 기존 요구사항을 확인할 때는 명세 섹션 참조 `[Spec §X.Y]`
   - 누락된 요구사항을 확인할 때는 `[공백(Gap)]` 마커 사용

   **품질 차원별 예시**:

   완전성 (Completeness):
   - "모든 API 실패 모드에 대해 에러 처리 요구사항이 정의되었습니까? [공백]"
   - "모든 상호작용 요소에 대해 접근성 요구사항이 명시되었습니까? [완전성]"
   - "반응형 레이아웃을 위한 모바일 브레이크포인트 요구사항이 정의되었습니까? [공백]"

   명확성 (Clarity):
   - "'빠른 로딩'이 구체적인 시간 임계값으로 수량화되었습니까? [명확성, Spec §NFR-2]"
   - "'관련 에피소드' 선택 기준이 명시적으로 정의되었습니까? [명확성, Spec §FR-5]"
   - "'눈에 띄는'이라는 표현이 측정 가능한 시각적 속성으로 정의되었습니까? [모호성, Spec §FR-4]"

   일관성 (Consistency):
   - "네비게이션 요구사항이 모든 페이지에서 일치합니까? [일관성, Spec §FR-10]"
   - "카드 컴포넌트 요구사항이 랜딩 페이지와 상세 페이지 간에 일관됩니까? [일관성]"

   커버리지 (Coverage):
   - "데이터가 없는 상태(zero-state) 시나리오에 대한 요구사항이 정의되었습니까? [커버리지, 예외 케이스]"
   - "동시 사용자 상호작용 시나리오가 다루어지고 있습니까? [커버리지, 공백]"
   - "부분적 데이터 로드 실패에 대한 요구사항이 명시되었습니까? [커버리지, 예외 흐름]"

   측정 가능성 (Measurability):
   - "시각적 계층 구조 요구사항이 측정/테스트 가능합니까? [수락 기준, Spec §FR-1]"
   - "'균형 잡힌 시각적 무게'를 객관적으로 검증할 수 있습니까? [측정 가능성, Spec §FR-2]"

   **시나리오 분류 및 커버리지** (요구사항 품질 집중):
   - 다음 요구사항이 존재하는지 확인: 기본, 대안, 예외/에러, 복구, 비기능 시나리오
   - 각 시나리오 클래스에 대해 질문: "[시나리오 유형] 요구사항이 완전하고 명확하며 일관됩니까?"
   - 시나리오 클래스가 누락된 경우: "[시나리오 유형] 요구사항이 의도적으로 제외된 것입니까, 아니면 누락된 것입니까? [공백]"
   - 상태 변경이 발생하는 경우 복원력/롤백 포함: "마이그레이션 실패에 대한 롤백 요구사항이 정의되었습니까? [공백]"

   **추적성 요구사항 (Traceability)**:
   - 최소: 항목의 80% 이상은 적어도 하나의 추적성 참조를 포함해야 함
   - 각 항목은 명세 섹션 `[Spec §X.Y]`을 참조하거나, `[공백]`, `[모호성]`, `[충돌]`, `[가정]` 마커를 사용해야 함
   - ID 체계가 없는 경우: "요구사항 및 수락 기준 ID 체계가 수립되었습니까? [추적성]"

   **이슈 노출 및 해결** (요구사항 품질 문제):
   요구사항 자체에 대해 질문하십시오:
   - 모호성: "'빠른'이라는 용어가 구체적인 메트릭으로 수량화되었습니까? [모호성, Spec §NFR-1]"
   - 충돌: "§FR-10과 §FR-10a 사이의 네비게이션 요구사항이 충돌합니까? [충돌]"
   - 가정: "'항상 사용 가능한 팟캐스트 API'라는 가정이 검증되었습니까? [가정]"
   - 종속성: "외부 팟캐스트 API 요구사항이 문서화되었습니까? [종속성, 공백]"
   - 정의 누락: "'시각적 계층 구조'가 측정 가능한 기준으로 정의되었습니까? [공백]"

   **내용 통합**:
   - 권장 한도: 후보 항목이 40개를 초과하는 경우 위험/영향도에 따라 우선순위 지정
   - 동일한 요구사항 측면을 확인하는 유사 중복 항목 병합
   - 영향도가 낮은 예외 케이스가 5개 이상인 경우 하나로 통합: "요구사항에서 예외 케이스 X, Y, Z가 다루어지고 있습니까? [커버리지]"

   **🚫 절대 금지 사항** - 이것들은 요구사항 테스트가 아닌 구현 테스트로 만듭니다:
   - ❌ "확인(Verify)", "테스트(Test)", "확정(Confirm)", "체크(Check)" + 구현 동작으로 시작하는 모든 항목
   - ❌ 코드 실행, 사용자 작업, 시스템 동작에 대한 참조
   - ❌ "올바르게 표시됨", "제대로 작동함", "기대대로 기능함"
   - ❌ "클릭", "이동", "렌더링", "로드", "실행"
   - ❌ 테스트 케이스, 테스트 계획, QA 절차
   - ❌ 구현 세부 사항 (프레임워크, API, 알고리즘)

   **✅ 권장 패턴** - 요구사항 품질을 테스트합니다:
   - ✅ "[요구사항 유형]이 [시나리오]에 대해 정의/명시/문서화되어 있습니까?"
   - ✅ "[모호한 용어]가 구체적인 기준으로 수량화/명확화되었습니까?"
   - ✅ "요구사항이 [섹션 A]와 [섹션 B] 간에 일관됩니까?"
   - ✅ "[요구사항]을 객관적으로 측정/검증할 수 있습니까?"
   - ✅ "요구사항에서 [예외 케이스/시나리오]가 다루어지고 있습니까?"
   - ✅ "명세에서 [누락된 측면]을 정의하고 있습니까?"

6. **구조 참조**: 제목, 메타 섹션, 카테고리 헤더 및 ID 형식을 위해 `.specify/templates/checklist-template.md`의 정식 템플릿을 따라 체크리스트를 생성하십시오. 템플릿을 사용할 수 없는 경우: H1 제목, 용도/생성일 메타 라인, CHK001부터 전역적으로 증가하는 ID를 포함하는 `- [ ] CHK### <요구사항 항목>` 라인이 포함된 `##` 카테고리 섹션을 사용하십시오.

7. **보고**: 체크리스트 파일의 전체 경로, 항목 수를 출력하고, 새 파일이 생성되었는지 또는 기존 파일에 추가되었는지 요약하십시오. 다음을 포함하십시오:
   - 선택된 집중 영역
   - 깊이 수준
   - 행위자/시기
   - 포함된 사용자 명시 필수 항목

**중요**: 각 `/speckit.checklist` 명령 실행은 짧고 설명적인 체크리스트 파일명을 사용하며, 새 파일을 생성하거나 기존 파일에 내용을 추가합니다. 이를 통해 다음이 가능합니다:

- 다양한 유형의 여러 체크리스트 관리 (예: `ux.md`, `test.md`, `security.md`)
- 체크리스트 목적을 나타내는 간단하고 기억하기 쉬운 파일명
- `checklists/` 폴더 내에서 쉬운 식별 및 탐색

혼란을 피하기 위해 설명적인 유형을 사용하고, 완료된 후 더 이상 필요 없는 체크리스트는 정리하십시오.

