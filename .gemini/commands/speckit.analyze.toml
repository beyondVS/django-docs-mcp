**매핑되지 않은 작업 (Unmapped Tasks):** (있는 경우)

**메트릭 (Metrics):**
- 총 요구사항 수
- 총 작업 수
- 커버리지 % (작업이 1개 이상인 요구사항)
- 모호성 수
- 중복 수
- 심각한 이슈 수

### 7. 다음 단계 안내

보고서 끝에 간결한 "다음 단계(Next Actions)" 블록을 출력하십시오:

- **심각(CRITICAL)** 이슈가 있는 경우: `/speckit.implement` 전에 해결할 것을 권장
- **낮음/중간(LOW/MEDIUM)**만 있는 경우: 진행할 수 있으나 개선 제안 제공
- 명시적인 커멘드 제안: 예: "/speckit.specify를 실행하여 정교화", "/speckit.plan을 실행하여 아키텍처 조정", "tasks.md를 수동으로 편집하여 '성능 메트릭' 커버리지 추가"

### 8. 개선 제안 제공

사용자에게 질문하십시오: "상위 N개 이슈에 대해 구체적인 개선 편집안을 제안해 드릴까요?" (자동으로 적용하지 마십시오.)

## 운영 원칙

### 컨텍스트 효율성
- **최소한의 고신호 토큰**: 포괄적인 문서화가 아닌 실행 가능한 결과에 집중
- **단계적 공개**: 아티팩트를 점진적으로 로드하고 분석에 모든 내용을 쏟아붓지 않음
- **토큰 효율적 출력**: 결과 테이블을 50행으로 제한하고 나머지는 요약
- **결정론적 결과**: 변경 없이 다시 실행하면 일관된 ID와 카운트 생성

### 분석 가이드라인
- **절대로 파일을 수정하지 마십시오** (이것은 읽기 전용 분석입니다)
- **누락된 섹션을 절대로 날조하지 마십시오** (누락된 경우 정확하게 보고하십시오)
- **헌법 위반을 우선시하십시오** (이것은 항상 심각(CRITICAL)입니다)
- **포괄적인 규칙보다 예시를 사용하십시오** (일반적인 패턴이 아닌 구체적인 사례 인용)
- **이슈가 없는 경우 우아하게 보고하십시오** (커버리지 통계와 함께 성공 보고서 출력)

