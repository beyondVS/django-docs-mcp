description = "작업 생성 후 spec.md, plan.md, tasks.md 사이의 비파괴적 교차 아티팩트 일관성 및 품질 분석을 수행합니다."

prompt = """
---
description: 작업 생성 후 spec.md, plan.md, tasks.md 사이의 비파괴적 교차 아티팩트 일관성 및 품질 분석을 수행합니다.
---

## 사용자 입력

```text
$ARGUMENTS
```

사용자 입력이 있는 경우, 진행하기 전에 이를 **반드시** 고려해야 합니다.

## 목표

구현 전 세 가지 핵심 아티팩트(`spec.md`, `plan.md`, `tasks.md`) 간의 불일치, 중복, 모호성 및 미지정 항목을 식별합니다. 이 명령어는 `/speckit.tasks`가 성공적으로 `tasks.md`를 생성한 후에만 실행되어야 합니다.

## 운영 제약 사항

**엄격한 읽기 전용**: 어떠한 파일도 수정하지 마십시오. 구조화된 분석 보고서를 출력하십시오. 선택적인 수정 계획을 제안하되, 사용자가 명시적으로 승인한 경우에만 수동으로 후속 편집 명령을 호출해야 합니다.

**헌법의 권위**: 프로젝트 헌법(`.specify/memory/constitution.md`)은 이 분석 범위 내에서 **협상 불가능**합니다. 헌법과의 충돌은 자동으로 '심각(CRITICAL)'으로 분류되며, 원칙을 희석하거나 재해석하거나 묵인하는 것이 아니라 명세, 계획 또는 작업을 조정해야 합니다. 원칙 자체가 변경되어야 하는 경우, 이는 `/speckit.analyze` 밖에서 별도의 명시적인 헌법 업데이트를 통해 이루어져야 합니다.

## 실행 단계

### 1. 분석 문맥 초기화

저장소 루트에서 다음 명령어를 한 번 실행하여 `FEATURE_DIR` 및 `AVAILABLE_DOCS`를 JSON으로 파싱합니다.
- **Windows (PowerShell):** `.specify/scripts/powershell/check-prerequisites.ps1 -Json -RequireTasks -IncludeTasks`
- **Linux/macOS (Bash):** `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks`

필수 파일이 누락된 경우 에러 메시지와 함께 중단하십시오 (사용자에게 누락된 선행 조건 명령어를 실행하도록 안내).

### 2. 아티팩트 로드 (점진적 노출)

각 아티팩트에서 필요한 최소한의 문맥만 로드합니다:
- **spec.md**: 개요, 기능적/비기능적 요구 사항, 사용자 스토리, 예외 케이스
- **plan.md**: 아키텍처/스택 선택, 데이터 모델 참조, 단계(Phases), 기술적 제약
- **tasks.md**: 작업 ID, 설명, 단계 그룹화, 병렬 마커 [P], 참조된 파일 경로
- **헌법**: 원칙 검증을 위해 로드

### 3. 시맨틱 모델 구축

내부 표현을 생성합니다 (출력에 원본 아티팩트를 포함하지 마십시오):
- **요구 사항 인벤토리**: 각 요구 사항에 고유 키 부여
- **사용자 스토리/액션 인벤토리**: 수락 기준이 포함된 개별 사용자 작업
- **작업 커버리지 매핑**: 각 작업을 하나 이상의 요구 사항 또는 스토리에 매핑
- **헌법 규칙 세트**: 원칙 명칭 및 MUST/SHOULD 규정 추출

### 4. 감지 패스 (Detection Passes)

고신호 발견 사항에 집중합니다. 총 50개로 제한하고 나머지는 요약합니다.
- **중복 감지**: 유사한 요구 사항 식별
- **모호성 감지**: 측정 기준이 없는 모호한 형용사(빠른, 확장 가능한 등) 플래그 표시
- **미지정 항목**: 목적어나 측정 가능한 결과가 없는 요구 사항, 명세에 정의되지 않은 파일/컴포넌트를 참조하는 작업 등
- **헌법 일치성**: MUST 원칙과 충돌하는 요소 식별
- **커버리지 공백**: 연결된 작업이 없는 요구 사항 또는 매핑된 요구 사항이 없는 작업
- **불일치**: 용어의 불일치, 데이터 엔티티의 부재, 작업 순서 모순 등

### 5. 심각도 할당

- **심각(CRITICAL)**: 헌법 위반, 핵심 명세 누락, 기본 기능을 차단하는 커버리지 제로 요구 사항
- **높음(HIGH)**: 중복 또는 충돌하는 요구 사항, 모호한 보안/성능 속성, 테스트 불가능한 수락 기준
- **중간(MEDIUM)**: 용어 불일치, 비기능적 작업 커버리지 누락, 미지정된 예외 케이스
- **낮음(LOW)**: 스타일/문구 개선, 실행 순서에 영향을 주지 않는 경미한 중복

### 6. 요약 분석 보고서 생성

마크다운 형식의 보고서를 출력합니다.
- 명세 분석 보고서 테이블 (ID, 카테고리, 심각도, 위치, 요약, 권장 조치)
- 커버리지 요약 테이블
- 헌법 일치성 이슈
- 매핑되지 않은 작업
- 지표 (총 요구 사항 수, 총 작업 수, 커버리지 %, 모호성 수 등)

### 7. 다음 작업 제안

- 심각(CRITICAL) 이슈가 있는 경우: `/speckit.implement` 전에 해결 권장
- 낮음/중간만 있는 경우: 개선 제안과 함께 진행 가능 알림
- 구체적인 명령어 제안 (예: "/speckit.specify로 재정의", "/speckit.plan으로 아키텍처 조정" 등)

## 운영 원칙

- **파일을 절대 수정하지 마십시오** (읽기 전용 분석).
- **누락된 섹션을 허구로 만들어내지 마십시오** (정확하게 보고하십시오).
- **헌법 위반을 최우선으로 처리하십시오** (항상 CRITICAL).
"""
