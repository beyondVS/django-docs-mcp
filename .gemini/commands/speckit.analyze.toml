description = "작업 생성 후 spec.md, plan.md, tasks.md 간의 비파괴적 교차 아티팩트 일관성 및 품질 분석을 수행합니다."

prompt = """
---
description: 작업 생성 후 spec.md, plan.md, tasks.md 간의 비파괴적 교차 아티팩트 일관성 및 품질 분석을 수행합니다.
---

## 사용자 입력

```text
$ARGUMENTS
```

진행하기 전에 사용자 입력이 비어 있지 않다면 반드시 고려해야 합니다.

## 목표

구현 전 세 가지 핵심 아티팩트(`spec.md`, `plan.md`, `tasks.md`) 전체에서 불일치, 중복, 모호성 및 미흡하게 정의된 항목을 식별합니다. 이 명령은 `/speckit.tasks`가 완료된 `tasks.md`를 성공적으로 생성한 후에만 실행해야 합니다.

## 운영 제약 조건

**엄격한 읽기 전용(READ-ONLY)**: 어떤 파일도 수정하지 마십시오. 구조화된 분석 보고서를 출력하십시오. 선택적인 개선 계획을 제안하십시오(사용자가 명시적으로 승인한 후에만 후속 편집 명령을 수동으로 호출할 수 있습니다).

**헌법 권한(Constitution Authority)**: 프로젝트 헌법(`.specify/memory/constitution.md`)은 이 분석 범위 내에서 타협할 수 없습니다. 헌법 충돌은 자동으로 **심각(CRITICAL)**으로 분류되며, 원칙을 희석하거나 재해석하거나 묵인하는 것이 아니라 사양(spec), 계획(plan) 또는 작업(tasks)을 조정해야 합니다. 원칙 자체를 변경해야 하는 경우, `/speckit.analyze` 외부에서 별도의 명시적인 헌법 업데이트를 통해 이루어져야 합니다.

## 실행 단계

### 1. 분석 컨텍스트 초기화

현재 운영체제에 맞는 스크립트를 저장소 루트에서 한 번 실행하고 JSON을 파싱하여 `FEATURE_DIR` 및 `AVAILABLE_DOCS`를 가져옵니다:
- **Windows (win32)**: `.specify/scripts/powershell/check-prerequisites.ps1 -Json -RequireTasks -IncludeTasks`
- **그 외 (Linux/macOS)**: `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks`

JSON 결과를 바탕으로 다음 절대 경로를 도출합니다:

- SPEC = FEATURE_DIR/spec.md
- PLAN = FEATURE_DIR/plan.md
- TASKS = FEATURE_DIR/tasks.md

필요한 파일이 누락된 경우 오류 메시지와 함께 중단하십시오(사용자에게 누락된 필수 명령을 실행하도록 안내하십시오).
인자(args)에 "I'm Groot"와 같은 단일 인용구가 있는 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표 사용: "I'm Groot").

### 2. 아티팩트 로드 (단계적 공개)

각 아티팩트에서 필요한 최소한의 컨텍스트만 로드하십시오:

**spec.md에서:**
- 개요/컨텍스트 (Overview/Context)
- 기능적 요구사항 (Functional Requirements)
- 비기능적 요구사항 (Non-Functional Requirements)
- 사용자 스토리 (User Stories)
- 예외 케이스 (Edge Cases) (있는 경우)

**plan.md에서:**
- 아키텍처/스택 선택 (Architecture/stack choices)
- 데이터 모델 참조 (Data Model references)
- 단계 (Phases)
- 기술적 제약 조건 (Technical constraints)

**tasks.md에서:**
- 작업 ID (Task IDs)
- 설명 (Descriptions)
- 단계 그룹화 (Phase grouping)
- 병렬 마커 [P] (Parallel markers)
- 참조된 파일 경로 (Referenced file paths)

**헌법(constitution)에서:**
- 원칙 검증을 위해 `.specify/memory/constitution.md` 로드

### 3. 시맨틱 모델 구축

내부 표현을 생성하십시오 (출력에 원본 아티팩트를 포함하지 마십시오):

- **요구사항 인벤토리**: 각 기능 및 비기능 요구사항에 고유 키 할당 (명령형 구문을 기반으로 슬러그 도출; 예: "User can upload file" → `user-can-upload-file`)
- **사용자 스토리/액션 인벤토리**: 수락 기준이 포함된 개별 사용자 작업
- **작업 커버리지 매핑**: 각 작업을 하나 이상의 요구사항 또는 스토리에 매핑 (키워드 추론 또는 ID/핵심 문구와 같은 명시적 참조 패턴 사용)
- **헌법 규칙 세트**: 원칙 이름과 필수(MUST)/권장(SHOULD) 규범 문구 추출

### 4. 탐지 패스 (토큰 효율적 분석)

신호가 강한 결과에 집중하십시오. 총 결과 수를 50개로 제한하고 나머지는 요약으로 합산하십시오.

#### A. 중복 탐지 (Duplication Detection)
- 거의 중복된 요구사항 식별
- 통합을 위해 품질이 낮은 문구 표시

#### B. 모호성 탐지 (Ambiguity Detection)
- 측정 가능한 기준이 부족한 모호한 형용사(빠른, 확장 가능한, 보안적인, 직관적인, 견고한 등) 플래그 지정
- 해결되지 않은 플레이스홀더(TODO, TKTK, ???, `<placeholder>` 등) 플래그 지정

#### C. 사양 미흡 (Underspecification)
- 동사는 있지만 목적어나 측정 가능한 결과가 없는 요구사항
- 수락 기준 정렬이 누락된 사용자 스토리
- spec/plan에 정의되지 않은 파일이나 컴포넌트를 참조하는 작업

#### D. 헌법 준수 (Constitution Alignment)
- 필수(MUST) 원칙과 충돌하는 요구사항 또는 계획 요소
- 헌법에서 요구하는 섹션이나 품질 게이트 누락

#### E. 커버리지 공백 (Coverage Gaps)
- 연관된 작업이 없는 요구사항
- 매핑된 요구사항/스토리가 없는 작업
- 작업에 반영되지 않은 비기능 요구사항 (예: 성능, 보안)

#### F. 불일치 (Inconsistency)
- 용어 혼선 (파일마다 동일한 개념을 다르게 명명)
- plan에는 참조되었으나 spec에는 없는 데이터 엔티티 (또는 그 반대)
- 작업 순서 모순 (예: 종속성 메모 없이 기초 설정 작업보다 먼저 진행되는 통합 작업)
- 충돌하는 요구사항 (예: 한쪽은 Next.js를 요구하고 다른 쪽은 Vue를 명시)

### 5. 심각도 할당

다음 휴리스틱을 사용하여 결과의 우선순위를 정하십시오:

- **심각(CRITICAL)**: 헌법의 필수(MUST) 위반, 핵심 spec 아티팩트 누락, 또는 기본 기능을 차단하는 커버리지 제로 요구사항
- **높음(HIGH)**: 중복되거나 충돌하는 요구사항, 모호한 보안/성능 속성, 테스트 불가능한 수락 기준
- **중간(MEDIUM)**: 용어 혼선, 비기능 작업 커버리지 누락, 미흡하게 정의된 예외 케이스
- **낮음(LOW)**: 스타일/문구 개선, 실행 순서에 영향을 주지 않는 경미한 중복

### 6. 요약 분석 보고서 생성

다음 구조로 마크다운 보고서를 출력하십시오 (파일 쓰기 없음):

## 명세 분석 보고서 (Specification Analysis Report)

| ID | 카테고리 | 심각도 | 위치 | 요약 | 권장 사항 |
|----|----------|--------|------|------|-----------|
| A1 | 중복 | 높음 | spec.md:L120-134 | 두 개의 유사한 요구사항... | 문구 통합; 더 명확한 버전 유지 |

(결과당 한 행씩 추가; 카테고리 이니셜을 접두사로 사용하는 고정 ID 생성)

**커버리지 요약 테이블 (Coverage Summary Table):**

| 요구사항 키 | 작업 있음? | 작업 ID | 메모 |
|-------------|------------|---------|------|

