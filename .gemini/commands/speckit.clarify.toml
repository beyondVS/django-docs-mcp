description = "최대 5개의 정밀한 명확화 질문을 통해 현재 기능 명세의 미흡한 부분을 식별하고 답변을 명세에 기록합니다."

prompt = """
---
description: 최대 5개의 정밀한 명확화 질문을 통해 현재 기능 명세의 미흡한 부분을 식별하고 답변을 명세에 기록합니다.
handoffs:
  - label: 기술 계획 수립 (Build Technical Plan)
    agent: speckit.plan
    prompt: 이 명세에 대한 계획을 수립해 주세요. 다음을 사용하여 빌드 중입니다...
---

## 사용자 입력

```text
$ARGUMENTS
```

진행하기 전에 사용자 입력이 비어 있지 않다면 반드시 고려해야 합니다.

## 개요

목표: 활성화된 기능 명세에서 모호성이나 누락된 결정 포인트를 감지 및 감소시키고, 명확해진 내용을 명세 파일에 직접 기록합니다.

참고: 이 명확화 워크플로우는 `/speckit.plan`을 호출하기 전에 실행(및 완료)되어야 합니다. 사용자가 명확화 단계를 건너뛰겠다고 명시적으로 밝히면(예: 탐색적 스파이크 작업) 진행할 수 있으나, 후속 재작업 위험이 높아진다는 점을 경고해야 합니다.

실행 단계:

1. 현재 운영체제에 맞는 스크립트를 저장소 루트에서 **한 번** 실행합니다:
   - **Windows (win32)**: `.specify/scripts/powershell/check-prerequisites.ps1 -Json -PathsOnly`
   - **그 외 (Linux/macOS)**: `.specify/scripts/bash/check-prerequisites.sh --json --paths-only`

   이후 다음 JSON 페이로드 필드를 파싱합니다:
   - `FEATURE_DIR`
   - `FEATURE_SPEC`
   - (선택 사항: 향후 체인 흐름을 위해 `IMPL_PLAN`, `TASKS` 캡처)
   - JSON 파싱에 실패하면 중단하고 사용자에게 `/speckit.specify`를 다시 실행하거나 기능 브랜치 환경을 확인하도록 안내하십시오.
   - 인자(args)에 "I'm Groot"와 같은 단일 인용구가 있는 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표 사용: "I'm Groot").

2. 현재 명세(spec) 파일을 로드합니다. 다음 분류 체계를 사용하여 구조화된 모호성 및 커버리지 스캔을 수행합니다. 각 카테고리에 대해 '명확(Clear) / 부분적(Partial) / 누락(Missing)' 상태를 표시합니다. 우선순위 결정에 사용할 내부 커버리지 맵을 생성합니다(질문이 없는 경우 원본 맵을 출력하지 마십시오).

   기능 범위 및 동작 (Functional Scope & Behavior):
   - 핵심 사용자 목표 및 성공 기준
   - 명시적인 범위 외(Out-of-scope) 선언
   - 사용자 역할 / 페르소나 차별화

   도메인 및 데이터 모델 (Domain & Data Model):
   - 엔티티, 속성, 관계
   - 식별 및 고유성 규칙
   - 수명 주기 / 상태 전이
   - 데이터 볼륨 / 규모 가정

   상호작용 및 UX 흐름 (Interaction & UX Flow):
   - 핵심 사용자 여정 / 시퀀스
   - 에러 / 빈 상태 / 로딩 상태
   - 접근성 또는 로컬라이제이션 메모

   비기능적 품질 속성 (Non-Functional Quality Attributes):
   - 성능 (지연 시간, 처리량 목표)
   - 확장성 (수평/수직, 제한 사항)
   - 신뢰성 및 가용성 (가동 시간, 복구 기대치)
   - 관측 가능성 (로깅, 메트릭, 트레이싱 신호)
   - 보안 및 개인정보 보호 (인증/인가, 데이터 보호, 위협 가정)
   - 컴플라이언스 / 규제 제약 (있는 경우)

   통합 및 외부 종속성 (Integration & External Dependencies):
   - 외부 서비스/API 및 실패 모드
   - 데이터 가져오기/내보내기 형식
   - 프로토콜/버저닝 가정

   예외 케이스 및 실패 처리 (Edge Cases & Failure Handling):
   - 부정적 시나리오 (Negative scenarios)
   - 속도 제한 / 스로틀링
   - 충돌 해결 (예: 동시 편집)

   제약 조건 및 트레이드오프 (Constraints & Tradeoffs):
   - 기술적 제약 (언어, 저장소, 호스팅)
   - 명시적 트레이드오프 또는 거부된 대안

   용어 및 일관성 (Terminology & Consistency):
   - 정식 용어 사전 (Canonical glossary)
   - 기피 유의어 / 지원 중단 용어

   완료 신호 (Completion Signals):
   - 수락 기준의 테스트 가능성
   - 측정 가능한 완료 정의(Definition of Done) 스타일 지표

   기타 / 플레이스홀더 (Misc / Placeholders):
   - TODO 마커 / 미결정 사항
   - 수량화되지 않은 모호한 형용사 ("견고한", "직관적인")

   상태가 '부분적' 또는 '누락'인 각 카테고리에 대해 질문 후보를 추가하십시오. 단, 다음의 경우는 제외합니다:
   - 명확화가 구현 또는 검증 전략을 실질적으로 바꾸지 않는 경우
   - 정보를 계획 단계로 미루는 것이 더 나은 경우 (내부 메모로 기록)

3. 최대 5개의 우선순위가 지정된 명확화 질문 대기열을 (내부적으로) 생성합니다. 한꺼번에 모두 출력하지 마십시오. 다음 제약 조건을 적용합니다:
    - 전체 세션 동안 총 질문 수는 최대 5개로 제한합니다.
    - 각 질문은 다음 중 하나로 답변 가능해야 합니다:
       - 짧은 객관식 선택 (2~5개의 명확하고 상호 배타적인 옵션)
       - 단어 하나 또는 짧은 문구 답변 (명시적으로 "5단어 이내로 답변" 제한)
    - 아키텍처, 데이터 모델링, 작업 분해, 테스트 설계, UX 동작, 운영 준비성 또는 컴플라이언스 검증에 실질적인 영향을 주는 질문만 포함하십시오.
    - 카테고리 커버리지 균형 보장: 해결되지 않은 가장 영향력 있는 카테고리를 먼저 다루십시오. 중요한 영역(예: 보안 태세)이 해결되지 않은 채 영향도가 낮은 질문 두 개를 묻지 마십시오.
    - 이미 답변된 내용, 사소한 스타일 선호도, 계획 수준의 실행 세부 사항(정확성에 영향을 주지 않는 한)은 제외하십시오.
    - 후속 재작업 위험을 줄이거나 수락 테스트의 오정렬을 방지하는 명확화를 우선시하십시오.
    - 5개 이상의 카테고리가 해결되지 않은 경우, '영향도 * 불확실성' 휴리스틱에 따라 상위 5개를 선택하십시오.

4. 순차적 질문 루프 (대화형):
    - 한 번에 **정확히 하나**의 질문만 제시하십시오.
    - 객관식 질문의 경우:
       - **모든 옵션을 분석**하고 다음을 기준으로 **가장 적합한 옵션**을 결정하십시오:
          - 해당 프로젝트 유형에 대한 베스트 프랙티스
          - 유사한 구현에서의 일반적인 패턴
          - 위험 감소 (보안, 성능, 유지보수성)
          - 명세에 나타난 명시적 프로젝트 목표 또는 제약 조건과의 정렬
       - **권장 옵션**을 명확한 근거(최선의 선택인 이유를 설명하는 1~2문장)와 함께 상단에 두드러지게 제시하십시오.
       - 형식: `**권장(Recommended):** 옵션 [X] - <근거>`
       - 그 다음 모든 옵션을 마크다운 테이블로 렌더링하십시오:

       | 옵션 | 설명 |
       |------|------|
       | A | <옵션 A 설명> |
       | B | <옵션 B 설명> |
       | C | <옵션 C 설명> (필요에 따라 D/E 추가, 최대 5개) |
       | 기타 | 다른 짧은 답변 제공 (5단어 이내) (자유 양식 대안이 적절한 경우에만 포함) |

       - 테이블 아래에 다음 문구를 추가하십시오: `옵션 알파벳(예: "A")으로 응답하거나, "네" 또는 "권장"이라고 말하여 권장안을 수락하거나, 직접 짧은 답변을 제공할 수 있습니다.`
    - 단답형 스타일의 경우 (의미 있는 이산적 옵션이 없는 경우):
       - 베스트 프랙티스와 문맥에 기반한 **제안 답변**을 제공하십시오.
       - 형식: `**제안(Suggested):** <제안하는 답변> - <간략한 근거>`
       - 그 다음 출력하십시오: `형식: 짧은 답변 (5단어 이내). "네" 또는 "제안"이라고 말하여 제안을 수락하거나, 직접 답변을 제공할 수 있습니다.`
    - 사용자가 답변한 후:
       - 사용자가 "네", "권장", "제안"이라고 답하면 이전에 제시한 권장/제안안을 답변으로 사용하십시오.
       - 그렇지 않은 경우, 답변이 하나의 옵션에 매핑되거나 5단어 이내 제약에 맞는지 확인하십시오.
       - 모호한 경우 빠른 확인을 요청하십시오 (동일한 질문 횟수로 간주하며 다음으로 넘어가지 않음).
       - 만족스러운 답변을 얻으면 작업 메모리에 기록하고(아직 디스크에 쓰지 않음) 대기열의 다음 질문으로 이동하십시오.
    - 다음의 경우 질문을 중단하십시오:
       - 모든 핵심 모호성이 조기에 해결됨 (남은 대기열 항목이 불필요해짐)
       - 사용자가 완료 신호를 보냄 ("완료", "좋음", "그만")
       - 질문 횟수가 5개에 도달함
    - 다음에 나올 질문을 미리 공개하지 마십시오.
    - 시작 시 유효한 질문이 없으면 즉시 중요한 모호성이 없음을 보고하십시오.

5. 각 답변 수락 후 통합 (점진적 업데이트 방식):
    - 메모리 내 명세 표현(시작 시 로드됨)과 원본 파일 내용을 유지합니다.
    - 이 세션의 첫 번째 통합 답변에 대해:
       - `## Clarifications` 섹션이 존재하는지 확인하십시오 (누락된 경우 명세 템플릿에 따라 가장 상위 컨텍스트/개요 섹션 바로 뒤에 생성).
       - 그 아래에 오늘 날짜의 `### Session YYYY-MM-DD` 소제목을 생성하십시오(없는 경우).
    - 수락 직후 글머리 기호 라인을 추가하십시오: `- Q: <질문> → A: <최종 답변>`.
    - 그런 다음 명확해진 내용을 즉시 가장 적절한 섹션에 적용하십시오:
       - 기능적 모호성 → Functional Requirements에 글머리 기호 업데이트 또는 추가.
       - 사용자 상호작용 / 행위자 차별화 → clarified 역할, 제약 또는 시나리오로 User Stories 또는 Actors 하위 섹션(있는 경우) 업데이트.
       - 데이터 형태 / 엔티티 → 순서를 유지하며 Data Model 업데이트 (필드, 유형, 관계 추가); 추가된 제약 조건을 간결하게 기록.
       - 비기능적 제약 → Non-Functional / Quality Attributes 섹션에 측정 가능한 기준 추가/수정 (모호한 형용사를 메트릭이나 명시적 목표로 변환).
       - 예외 케이스 / 부정적 흐름 → Edge Cases / Error Handling 아래에 새 글머리 기호 추가 (템플릿에 플레이스홀더가 있다면 해당 섹션 생성).
       - 용어 충돌 → 명세 전체에서 용어 표준화; 원본 유지가 필요한 경우에만 한 번 `(이전 명칭: "X")` 추가.
    - 명확화 내용이 이전의 모호한 문장을 무효화하는 경우, 중복하지 말고 해당 문장을 교체하십시오. 모순되는 오래된 텍스트를 남기지 마십시오.
    - 컨텍스트 손실 위험을 최소화하기 위해 각 통합 후 명세 파일을 저장하십시오 (원자적 덮어쓰기).
    - 포맷 유지: 관련 없는 섹션의 순서를 바꾸지 말고 헤딩 계층 구조를 그대로 유지하십시오.
    - 삽입되는 각 명확화 내용을 최소화하고 테스트 가능하게 유지하십시오 (서술적 확산 방지).

6. 검증 (각 쓰기 작업 후 및 최종 패스 시 수행):
   - Clarifications 세션에는 수락된 답변당 정확히 하나의 글머리 기호가 포함되어야 함 (중복 없음).
   - 총 질문(수락됨) 수 ≤ 5.
   - 업데이트된 섹션에 새로운 답변으로 해결하려 했던 모호한 플레이스홀더가 남아 있지 않음.
   - 모순되는 이전 문장이 남아 있지 않음 (제거된 잘못된 대안 선택지가 있는지 스캔).
   - 마크다운 구조 유효; 허용된 새 헤딩은 오직 `## Clarifications`, `### Session YYYY-MM-DD`뿐임.
   - 용어 일관성: 모든 업데이트된 섹션에서 동일한 정식 용어 사용.

7. 업데이트된 명세를 `FEATURE_SPEC`에 다시 씁니다.

8. 완료 보고 (질문 루프 종료 또는 조기 종료 후):
   - 질문 및 답변 횟수.
   - 업데이트된 명세 경로.
   - 수정된 섹션 목록.
   - 각 분류 카테고리와 상태가 포함된 커버리지 요약 테이블: 해결됨(Resolved, 부분적/누락이었으나 해결), 보류됨(Deferred, 질문 할당량을 초과했거나 계획 단계에 더 적합함), 명확함(Clear, 이미 충분함), 미해결(Outstanding, 여전히 부분적/누락이지만 영향도가 낮음).
   - '미해결' 또는 '보류됨' 항목이 남은 경우, `/speckit.plan`으로 진행할지 아니면 나중에 `/speckit.clarify`를 다시 실행할지 권장안 제시.
   - 제안하는 다음 명령.

행동 규칙:

- 의미 있는 모호성을 찾지 못한 경우(또는 모든 잠재적 질문의 영향도가 낮은 경우): "공식적인 명확화가 필요한 중요한 모호성이 발견되지 않았습니다."라고 응답하고 다음 단계 진행을 제안하십시오.
- 명세 파일이 누락된 경우, 사용자에게 `/speckit.specify`를 먼저 실행하도록 안내하십시오 (여기서 새 명세를 생성하지 마십시오).
- 총 질문 수는 5개를 절대 초과하지 마십시오 (단일 질문에 대한 재시도는 새 질문으로 치지 않음).
- 기능적 명확성을 방해하지 않는 한 추측성 기술 스택 질문은 피하십시오.
- 사용자의 조기 종료 신호("중단", "완료", "진행")를 존중하십시오.
- 풀 커버리지로 인해 질문을 하지 않은 경우, 압축된 커버리지 요약(모든 카테고리 Clear)을 출력하고 다음 단계 진행을 제안하십시오.
- 해결되지 않은 영향도 높은 카테고리가 남은 상태에서 할당량에 도달한 경우, 근거와 함께 '보류됨(Deferred)' 아래에 명시적으로 표시하십시오.

