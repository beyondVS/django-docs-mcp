description = "현재 기능 명세에서 미지정된 영역을 식별하기 위해 최대 5개의 타겟팅된 질문을 던지고 답변을 명세에 기록합니다."

prompt = """
---
description: 현재 기능 명세에서 미지정된 영역을 식별하기 위해 최대 5개의 타겟팅된 질문을 던지고 답변을 명세에 기록합니다.
handoffs:
  - label: 기술 계획 수립
    agent: speckit.plan
    prompt: 이 명세에 대한 계획을 수립합니다. 다음 기술 스택을 사용합니다...
---

## 사용자 입력

```text
$ARGUMENTS
```

사용자 입력이 있는 경우, 진행하기 전에 이를 **반드시** 고려해야 합니다.

## 개요

목표: 활성 기능 명세에서 모호성이나 누락된 결정 포인트를 감지 및 감소시키고, 명확해진 내용을 명세 파일에 직접 기록합니다.

참고: 이 명확화 워크플로우는 `/speckit.plan`을 호출하기 전에 실행되어야 합니다.

실행 단계:

1. 저장소 루트에서 다음 명령어를 한 번 실행하여 경로 정보를 JSON으로 파싱합니다.
   - **Windows (PowerShell):** `.specify/scripts/powershell/check-prerequisites.ps1 -Json -PathsOnly`
   - **Linux/macOS (Bash):** `.specify/scripts/bash/check-prerequisites.sh --json --paths-only`

2. 현재 명세 파일을 로드합니다. 기능 범위, 도메인/데이터 모델, 상호작용/UX 흐름, 비기능적 속성, 통합/의존성, 예외 케이스 등의 카테고리에 대해 모호성 및 커버리지 스캔을 수행합니다.

3. 우선순위가 지정된 명확화 질문 큐를 생성합니다 (최대 5개). 한 번에 하나씩만 출력하십시오.
    - 전체 세션에서 최대 5개 질문으로 제한합니다.
    - 각 질문은 객관식(2-5개 옵션) 또는 짧은 답변(5단어 이내)으로 답변할 수 있어야 합니다.
    - 아키텍처, 데이터 모델링, 작업 분해, 테스트 설계 등에 실질적인 영향을 미치는 질문만 포함합니다.

4. 순차적 질문 루프 (인터랙티브):
    - **한 번에 정확히 하나의 질문**만 제시합니다.
    - 객관식 질문의 경우:
       - 베스트 프랙티스, 일반적인 패턴, 리스크 감소 등을 바탕으로 **가장 적절한 권장 옵션**을 결정합니다.
       - 권장 옵션을 상단에 명확한 이유와 함께 제시합니다.
       - 예: `**권장:** 옵션 [X] - <이유>`
       - 모든 옵션을 마크다운 테이블로 렌더링합니다.
    - 사용자가 답변하면 (예: "A", "yes", "권장사항대로" 등), 답변을 기록하고 다음 질문으로 이동합니다.

5. 각 답변 수락 후 통합 (점진적 업데이트):
    - 명세 파일에 `## Clarifications` 섹션을 확인하거나 생성합니다 (최상위 개요 섹션 바로 뒤).
    - 그 아래에 `### Session YYYY-MM-DD` (오늘 날짜) 하위 제목을 만듭니다.
    - `- Q: <질문> → A: <최종 답변>` 형식으로 답변을 추가합니다.
    - 동시에 명세의 가장 적절한 섹션(기능적 요구 사항, 데이터 모델 등)에 내용을 반영합니다.
    - 이전의 모호한 문구는 새로운 답변으로 교체하여 모순되는 텍스트가 남지 않도록 합니다.

6. 검증 및 보고:
    - 각 쓰기 작업 후 질문 제한 준수 여부와 명세의 일관성을 확인합니다.
    - 질문 루프 종료 후 업데이트된 명세 경로, 수정된 섹션 목록, 커버리지 요약 테이블을 보고합니다.

## 행동 규칙

- 의미 있는 모호성이 발견되지 않으면 "공식적인 명확화가 필요한 심각한 모호성이 발견되지 않았습니다."라고 응답하고 다음 단계를 제안하십시오.
- 명세 파일이 없는 경우 `/speckit.specify`를 먼저 실행하도록 안내하십시오.
- 총 5개의 질문을 초과하지 마십시오.
- 사용자의 조기 종료 신호("그만", "완료", "진행해")를 존중하십시오.
"""
