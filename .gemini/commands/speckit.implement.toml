description = "tasks.md에 정의된 모든 작업을 처리하고 실행하여 구현 계획을 실행합니다."

prompt = """
---
description: tasks.md에 정의된 모든 작업을 처리하고 실행하여 구현 계획을 실행합니다.
---

## 사용자 입력

```text
$ARGUMENTS
```

사용자 입력이 있는 경우, 진행하기 전에 이를 **반드시** 고려해야 합니다.

## 사전 실행 확인

**구현 전 확장 훅 확인**:
- 프로젝트 루트에 `.specify/extensions.yml`이 있는지 확인합니다.
- 존재하는 경우 `hooks.before_implement` 항목을 확인하고 활성화된 훅을 실행합니다.

## 개요

1. 저장소 루트에서 다음 명령어를 실행하여 `FEATURE_DIR` 및 `AVAILABLE_DOCS` 목록을 JSON으로 파싱합니다.
   - **Windows (PowerShell):** `.specify/scripts/powershell/check-prerequisites.ps1 -Json -RequireTasks -IncludeTasks`
   - **Linux/macOS (Bash):** `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks`

2. **체크리스트 상태 확인** (`FEATURE_DIR/checklists/`가 존재하는 경우):
   - 디렉토리 내의 모든 체크리스트 파일을 스캔합니다.
   - 전체 항목, 완료된 항목, 미완료 항목 수를 집계합니다.
   - 상태 테이블을 생성합니다 (예: `| Checklist | Total | Completed | Incomplete | Status |`).
   - **미완료 항목이 있는 경우**: 테이블을 표시하고 "일부 체크리스트가 완료되지 않았습니다. 그래도 구현을 진행하시겠습니까? (yes/no)"라고 묻습니다.
   - 사용자가 "yes"라고 답하면 다음 단계로 진행합니다.

3. 구현 문맥 로드 및 분석:
   - **필수**: `tasks.md` (전체 작업 목록 및 실행 계획), `plan.md` (기술 스택, 아키텍처, 파일 구조)
   - **선택**: `data-model.md`, `contracts/`, `research.md`, `quickstart.md`

4. **프로젝트 설정 검증**:
   - 실제 프로젝트 설정에 따라 `.gitignore`, `.dockerignore`, `.eslintignore`, `.prettierignore` 등 무시 파일들이 올바르게 구성되었는지 확인하고 업데이트합니다.

5. `tasks.md` 구조를 파싱하고 다음을 추출합니다:
   - 작업 단계(Phases): 설정, 테스트, 핵심, 통합, 다듬기
   - 작업 의존성: 순차 실행 vs 병렬 실행 규칙
   - 작업 상세: ID, 설명, 파일 경로, 병렬 마커 [P]

6. 작업 계획에 따라 구현을 실행합니다:
   - **단계별 실행**: 한 단계를 완료한 후 다음 단계로 이동합니다.
   - **의존성 준수**: 순차 작업은 순서대로, 병렬 작업[P]은 함께 실행할 수 있습니다.
   - **TDD 접근 방식**: 테스트 작업이 있는 경우 구현 작업 전에 먼저 테스트를 실행합니다.
   - **파일 기반 조정**: 동일한 파일에 영향을 주는 작업은 순차적으로 실행해야 합니다.

7. 구현 실행 규칙:
   - **설정 우선**: 프로젝트 구조, 의존성, 구성을 초기화합니다.
   - **코드 전 테스트**: 계약, 엔티티, 통합 시나리오에 대한 테스트가 필요한 경우 먼저 작성합니다.
   - **핵심 개발**: 모델, 서비스, CLI 명령어, 엔드포인트를 구현합니다.
   - **통합 작업**: 데이터베이스 연결, 미들웨어, 로깅, 외부 서비스를 구현합니다.
   - **다듬기 및 검증**: 유닛 테스트, 성능 최적화, 문서를 작성합니다.

8. 진행 추적 및 에러 처리:
   - 각 작업 완료 후 진행 상황을 보고합니다.
   - 병렬이 아닌 작업이 실패하면 실행을 중단합니다.
   - **중요**: 완료된 작업은 반드시 작업 파일(`tasks.md`)에 `[X]`로 표시하십시오.

9. 완료 검증:
   - 모든 필수 작업이 완료되었는지 확인합니다.
   - 구현된 기능이 원본 명세와 일치하는지 확인합니다.
   - 테스트를 통과하고 구현이 기술 계획을 따르는지 확인합니다.
   - 완료된 작업 요약과 함께 최종 상태를 보고합니다.

10. **확장 훅 확인**: 완료 검증 후 `hooks.after_implement` 훅이 있는지 확인하고 실행합니다.
"""
