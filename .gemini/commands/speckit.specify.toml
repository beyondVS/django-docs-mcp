description = "자연어 기능 설명을 바탕으로 기능 명세서(feature specification)를 생성하거나 업데이트합니다."

prompt = """
---
description: 자연어 기능 설명을 바탕으로 기능 명세서(feature specification)를 생성하거나 업데이트합니다.
handoffs:
  - label: 기술 계획 수립
    agent: speckit.plan
    prompt: 이 명세에 대한 계획을 수립합니다. 다음 기술 스택을 사용합니다...
  - label: 명세 요구 사항 명확화
    agent: speckit.clarify
    prompt: 명세 요구 사항을 명확히 합니다.
    send: true
---

## 사용자 입력

```text
$ARGUMENTS
```

사용자 입력이 있는 경우, 진행하기 전에 이를 **반드시** 고려해야 합니다.

## 개요

`/speckit.specify` 명령어 뒤에 입력된 텍스트가 기능 설명입니다. `{{args}}`가 아래에 문자 그대로 나타나더라도 이 대화에서 항상 사용할 수 있다고 가정하십시오. 사용자가 빈 명령을 제공하지 않는 한 다시 묻지 마십시오.

기능 설명을 바탕으로 다음을 수행하십시오:

1. **간결한 짧은 이름 생성** (2-4단어):
   - 기능 설명을 분석하고 가장 의미 있는 키워드를 추출합니다.
   - 기능의 핵심을 담은 2-4단어의 짧은 이름을 만듭니다.
   - 가능하면 "동사-명사" 형식을 사용합니다 (예: "add-user-auth", "fix-payment-bug").
   - 기술 용어 및 약어(OAuth2, API, JWT 등)를 보존합니다.
   - 한눈에 기능을 이해할 수 있도록 간결하지만 설명적이어야 합니다.

2. **기능 브랜치 생성**: `--short-name` (및 `--json`) 옵션과 함께 스크립트를 실행합니다. `--number`는 전달하지 마십시오 (스크립트가 모든 브랜치와 명세 디렉토리를 확인하여 전역적으로 사용 가능한 다음 번호를 자동으로 감지합니다).

   **실행 명령어 (OS에 따라 선택):**
   - **Windows (PowerShell):** `.specify/scripts/powershell/create-new-feature.ps1 "$ARGUMENTS" -Json -ShortName "짧은-이름"`
   - **Linux/macOS (Bash):** `.specify/scripts/bash/create-new-feature.sh "$ARGUMENTS" --json --short-name "짧은-이름"`

   **중요**:
   - `--number`를 전달하지 마십시오. 스크립트가 자동으로 다음 번호를 결정합니다.
   - 출력을 안정적으로 파싱할 수 있도록 항상 JSON 플래그(`-Json` 또는 `--json`)를 포함하십시오.
   - 이 스크립트는 기능당 한 번만 실행해야 합니다.
   - JSON 출력은 터미널에 표시됩니다. 실제 필요한 내용(BRANCH_NAME, SPEC_FILE 경로 등)을 얻기 위해 항상 이를 참조하십시오.

3. `.specify/templates/spec-template.md`를 로드하여 필요한 섹션을 이해합니다.

4. 다음 실행 흐름을 따릅니다:

    1. 사용자 입력 설명 파싱
       비어 있는 경우: 에러 "기능 설명이 제공되지 않았습니다."
    2. 설명에서 핵심 개념 추출
       식별: 행위자(actors), 행동(actions), 데이터(data), 제약 사항(constraints)
    3. 불명확한 부분에 대해:
       - 문맥과 업계 표준을 바탕으로 정보에 입각한 추측을 합니다.
       - 다음의 경우에만 [확인 필요: 구체적인 질문]으로 표시합니다:
         - 선택이 기능 범위나 사용자 경험에 큰 영향을 미치는 경우
         - 서로 다른 의미를 지닌 여러 합리적인 해석이 존재하는 경우
         - 합리적인 기본값이 존재하지 않는 경우
       - **제한: 총 최대 3개의 [확인 필요] 마커만 사용**
    4. 사용자 시나리오 및 테스트 섹션 작성
    5. 기능적 요구 사항 생성 (각 요구 사항은 테스트 가능해야 함)
    6. 성공 기준 정의 (측정 가능하고 기술 중립적인 결과)
    7. 주요 엔티티 식별 (데이터가 포함된 경우)
    8. 반환: 성공 (명세가 계획 수립 준비됨)

5. 명세 내용을 `SPEC_FILE`에 작성합니다. 템플릿 구조를 사용하고 섹션 순서와 제목을 유지하면서 플레이스홀더를 구체적인 내용으로 교체합니다.

6. **명세 품질 검증**: 초안 작성 후 품질 기준에 따라 검증합니다.
   - `FEATURE_DIR/checklists/requirements.md`에 품질 체크리스트를 생성합니다.
   - 모든 항목을 통과하는지 확인하고, 실패하는 경우 명세를 업데이트합니다 (최대 3회 반복).
   - [확인 필요] 마커가 남아 있는 경우 사용자에게 질문을 던져 답변을 받습니다.

7. 브랜치 이름, 명세 파일 경로, 체크리스트 결과 및 다음 단계(` /speckit.clarify` 또는 `/speckit.plan`) 준비 완료 상태를 보고합니다.

**참고:** 스크립트가 새 브랜치를 생성하고 체크아웃한 후 쓰기 작업을 수행하기 전에 명세 파일을 초기화합니다.

## 일반 가이드라인

- 사용자가 **무엇(WHAT)**을 필요로 하는지, 그리고 **왜(WHY)** 필요한지에 집중하십시오.
- **어떻게(HOW)** 구현할지는 피하십시오 (기술 스택, API, 코드 구조 제외).
- 개발자가 아닌 비즈니스 이해관계자를 위해 작성하십시오.
- 명세 내에 체크리스트를 포함하지 마십시오. 체크리스트는 별도의 명령어로 생성됩니다.
"""
