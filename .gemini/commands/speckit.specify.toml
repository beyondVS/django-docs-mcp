description = "자연어 기능 설명을 바탕으로 기능 명세(Specification)를 생성하거나 업데이트합니다."

prompt = """
---
description: 자연어 기능 설명을 바탕으로 기능 명세(Specification)를 생성하거나 업데이트합니다.
handoffs:
  - label: 기술 계획 수립 (Build Technical Plan)
    agent: speckit.plan
    prompt: 이 명세에 대한 계획을 수립해 주세요. 다음을 사용하여 빌드 중입니다...
  - label: 명세 요구사항 명확화 (Clarify Spec Requirements)
    agent: speckit.clarify
    prompt: 명세 요구사항을 명확하게 해 주세요.
    send: true
---

## 사용자 입력

```text
$ARGUMENTS
```

진행하기 전에 사용자 입력이 비어 있지 않다면 반드시 고려해야 합니다.

## 개요 (Outline)

트리거 메시지에서 `/speckit.specify` 뒤에 사용자가 입력한 텍스트가 바로 **기능 설명**입니다. 아래에 `{{args}}`가 그대로 나타나더라도 이 대화에서 항상 사용할 수 있다고 가정하십시오. 사용자가 빈 명령을 제공하지 않는 한 다시 말해달라고 요청하지 마십시오.

기능 설명이 주어지면 다음을 수행하십시오:

1. **간결한 브랜치명(Short Name) 생성** (2~4단어):
   - 기능 설명을 분석하여 가장 의미 있는 키워드를 추출합니다.
   - 기능의 핵심을 담은 2~4단어의 짧은 이름을 만듭니다.
   - 가능한 경우 '동사-명사' 형식을 사용합니다 (예: "add-user-auth", "fix-payment-bug").
   - 기술 용어 및 약어(OAuth2, API, JWT 등)를 보존합니다.
   - 간결하면서도 한눈에 기능을 이해할 수 있을 만큼 설명적이어야 합니다.
   - 예시:
     - "사용자 인증 기능을 추가하고 싶어" → "user-auth"
     - "API에 OAuth2 통합 구현" → "oauth2-api-integration"
     - "분석용 대시보드 만들기" → "analytics-dashboard"
     - "결제 처리 타임아웃 버그 수정" → "fix-payment-timeout"

2. **기능 브랜치 생성**: 현재 운영체제에 맞는 스크립트를 `-ShortName`(또는 `--short-name`) 및 `-Json`(또는 `--json`) 파라미터와 함께 실행합니다. 이때 `-Number`(또는 `--number`)는 전달하지 마십시오 (스크립트가 모든 브랜치와 명세 디렉토리를 확인하여 다음 사용 가능한 번호를 자동으로 감지합니다).

   - **Windows (win32)**: `.specify/scripts/powershell/create-new-feature.ps1 "{{args}}" -Json -ShortName "짧은이름" "전체설명"`
   - **그 외 (Linux/macOS)**: `.specify/scripts/bash/create-new-feature.sh "{{args}}" --json --short-name "짧은이름" "전체설명"`

   **중요**:
   - `--number` 또는 `-Number`를 전달하지 마십시오. 스크립트가 자동으로 다음 번호를 결정합니다.
   - 출력 결과를 안정적으로 파싱할 수 있도록 항상 JSON 플래그(`--json` 또는 `-Json`)를 포함하십시오.
   - 이 스크립트는 기능당 한 번만 실행해야 합니다.
   - JSON은 터미널 출력으로 제공됩니다. 실제 내용을 확인하려면 항상 이 JSON을 참조하십시오.
   - JSON 출력에는 `BRANCH_NAME` 및 `SPEC_FILE` 경로가 포함됩니다.
   - 인자(args)에 "I'm Groot"와 같은 단일 인용구가 있는 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표 사용: "I'm Groot").

3. `.specify/templates/spec-template.md`를 로드하여 필수 섹션을 파악합니다.

4. 다음 실행 흐름을 따르십시오:

    1. 입력에서 사용자 설명 파싱
       비어 있는 경우: 에러 "기능 설명이 제공되지 않았습니다 (No feature description provided)"
    2. 설명에서 핵심 개념 추출
       행위자(actors), 동작(actions), 데이터(data), 제약 조건(constraints) 식별
    3. 불분명한 측면에 대해:
       - 문맥과 업계 표준을 바탕으로 합리적으로 추측합니다.
       - 다음의 경우에만 `[NEEDS CLARIFICATION: 특정 질문]`으로 표시합니다:
         - 선택 사항이 기능 범위나 사용자 경험에 중대한 영향을 미치는 경우
         - 서로 다른 결과를 초래하는 합리적인 해석이 여러 개 존재하는 경우
         - 합리적인 기본값이 존재하지 않는 경우
       - **제한: 총 [NEEDS CLARIFICATION] 마커는 최대 3개까지만 사용**
       - 영향도에 따라 명확화 우선순위 지정: 범위 > 보안/개인정보 > 사용자 경험 > 기술 세부 사항
    4. 사용자 시나리오 및 테스트 섹션 작성
       사용자 흐름이 불분명한 경우: 에러 "사용자 시나리오를 결정할 수 없습니다 (Cannot determine user scenarios)"
    5. 기능적 요구사항 생성
       각 요구사항은 테스트 가능해야 함
       명시되지 않은 세부 사항에 대해서는 합리적인 기본값 사용 (가정(Assumptions) 섹션에 기록)
    6. 성공 기준(Success Criteria) 정의
       측정 가능하고 기술 비의존적인 결과를 만듭니다.
       정량적 메트릭(시간, 성능, 볼륨)과 정성적 측정(사용자 만족도, 작업 완료)을 모두 포함합니다.
       각 기준은 구현 세부 사항 없이 검증 가능해야 합니다.
    7. 핵심 엔티티 식별 (데이터가 포함된 경우)
    8. 반환: 성공 (계획 수립 준비 완료)

5. 템플릿 구조를 사용하여 `SPEC_FILE`에 명세를 씁니다. 섹션 순서와 제목을 유지하면서 기능 설명(인자)에서 도출된 구체적인 세부 사항으로 플레이스홀더를 대체합니다.

6. **명세 품질 검증**: 초기 명세를 작성한 후 품질 기준에 따라 검증합니다:

   a. **명세 품질 체크리스트 생성**: `FEATURE_DIR/checklists/requirements.md`에 체크리스트 템플릿 구조를 사용하여 다음 검증 항목이 포함된 파일을 생성합니다:

      ```markdown
      # 명세 품질 체크리스트: [기능 이름]

      **목적**: 계획 단계로 넘어가기 전 명세의 완전성과 품질 검증
      **생성일**: [날짜]
      **기능**: [spec.md 링크]

      ## 내용 품질

      - [ ] 구현 세부 사항 없음 (언어, 프레임워크, API 등)
      - [ ] 사용자 가치와 비즈니스 요구사항에 집중함
      - [ ] 비기술적 이해관계자를 위해 작성됨
      - [ ] 모든 필수 섹션이 완료됨

      ## 요구사항 완전성

      - [ ] [NEEDS CLARIFICATION] 마커가 남아 있지 않음
      - [ ] 요구사항이 테스트 가능하고 모호하지 않음
      - [ ] 성공 기준이 측정 가능함
      - [ ] 성공 기준이 기술 비의존적임 (구현 세부 사항 없음)
      - [ ] 모든 수락 시나리오가 정의됨
      - [ ] 예외 케이스가 식별됨
      - [ ] 범위가 명확하게 제한됨
      - [ ] 종속성 및 가정이 식별됨

      ## 기능 준비 상태

      - [ ] 모든 기능적 요구사항에 명확한 수락 기준이 있음
      - [ ] 사용자 시나리오가 주요 흐름을 커버함
      - [ ] 기능이 성공 기준에 정의된 측정 가능한 결과를 충족함
      - [ ] 구현 세부 사항이 명세에 노출되지 않음

      ## 메모

      - 미완료로 표시된 항목은 `/speckit.clarify` 또는 `/speckit.plan` 전에 명세 업데이트가 필요함
      ```

   b. **검증 수행**: 각 체크리스트 항목에 대해 명세를 검토합니다:
      - 각 항목의 통과/실패 여부를 결정합니다.
      - 발견된 구체적인 문제점을 문서화합니다 (관련 명세 섹션 인용).

   c. **검증 결과 처리**:

      - **모든 항목 통과 시**: 체크리스트를 완료로 표시하고 7단계로 진행합니다.

      - **항목 실패 시 ([NEEDS CLARIFICATION] 제외)**:
        1. 실패한 항목과 구체적인 문제점을 나열합니다.
        2. 각 문제를 해결하기 위해 명세를 업데이트합니다.
        3. 모든 항목이 통과될 때까지 검증을 다시 실행합니다 (최대 3회 반복).
        4. 3회 반복 후에도 실패하는 경우, 남은 문제를 체크리스트 메모에 기록하고 사용자에게 경고합니다.

      - **[NEEDS CLARIFICATION] 마커가 남은 경우**:
        1. 명세에서 모든 `[NEEDS CLARIFICATION: ...]` 마커를 추출합니다.
        2. **제한 확인**: 마커가 3개보다 많으면 가장 중요한 3개(범위/보안/UX 영향 기준)만 남기고 나머지는 합리적으로 추측합니다.
        3. 명확화가 필요한 각 사항(최대 3개)에 대해 다음 형식으로 사용자에게 옵션을 제시합니다:

           ```markdown
           ## 질문 [N]: [주제]

           **문맥**: [관련 명세 섹션 인용]

           **확인이 필요한 사항**: [[NEEDS CLARIFICATION] 마커의 구체적 질문]

           **제안 답변**:

           | 옵션 | 답변 | 영향 |
           |------|------|------|
           | A    | [첫 번째 제안 답변] | [이 선택이 기능에 미치는 영향] |
           | B    | [두 번째 제안 답변] | [이 선택이 기능에 미치는 영향] |
           | C    | [세 번째 제안 답변] | [이 선택이 기능에 미치는 영향] |
           | 직접 입력 | 직접 답변 제공 | [직접 답변을 제공하는 방법 설명] |

           **선택**: _[사용자 응답 대기]_
           ```

        4. **중요 - 테이블 포맷**: 마크다운 테이블이 올바르게 포맷되었는지 확인하십시오:
           - 파이프(|)가 정렬되도록 일관된 간격을 사용합니다.
           - 각 셀의 내용 양옆에 공백을 둡니다: `| 내용 |` (O), `|내용|` (X)
           - 헤더 구분선은 최소 3개의 대시를 사용합니다: `|--------|`
           - 마크다운 미리보기에서 테이블이 올바르게 렌더링되는지 테스트합니다.
        5. 질문에 순차적으로 번호를 매깁니다 (Q1, Q2, Q3 - 총 최대 3개).
        6. 답변을 기다리기 전에 모든 질문을 함께 제시합니다.
        7. 모든 질문에 대해 사용자가 선택한 답변을 할 때까지 기다립니다 (예: "Q1: A, Q2: 직접 입력 - [내용], Q3: B").
        8. 각 `[NEEDS CLARIFICATION]` 마커를 사용자가 선택하거나 제공한 답변으로 대체하여 명세를 업데이트합니다.
        9. 모든 명확화 사항이 해결된 후 검증을 다시 실행합니다.

   d. **체크리스트 업데이트**: 각 검증 반복 후 체크리스트 파일을 현재 통과/실패 상태로 업데이트합니다.

7. 브랜치명, 명세 파일 경로, 체크리스트 결과 및 다음 단계(`/speckit.clarify` 또는 `/speckit.plan`) 준비 상태를 보고하며 완료합니다.

**참고:** 스크립트는 새 브랜치를 생성 및 체크아웃하고 작성 전에 명세 파일을 초기화합니다.

## 빠른 가이드라인

- 사용자가 **무엇(WHAT)**을 필요로 하는지와 **왜(WHY)**에 집중하십시오.
- 구현 방법(**HOW**)은 피하십시오 (기술 스택, API, 코드 구조 등 제외).
- 개발자가 아닌 비즈니스 이해관계자를 위해 작성하십시오.
- 명세 내부에 체크리스트를 삽입하지 마십시오. 체크리스트는 별도의 명령으로 처리됩니다.

### 섹션 요구사항

- **필수 섹션**: 모든 기능에 대해 완료되어야 함
- **선택 섹션**: 해당 기능과 관련이 있을 때만 포함
- 섹션이 해당되지 않는 경우 "N/A"로 남기지 말고 섹션 자체를 완전히 제거하십시오.

### AI 생성 시 주의사항

사용자 프롬프트로부터 이 명세를 생성할 때:

1. **합리적인 추측**: 문맥, 업계 표준, 일반적인 패턴을 사용하여 공백을 채웁니다.
2. **가정 문서화**: 합리적인 기본값은 가정(Assumptions) 섹션에 기록합니다.
3. **명확화 제한**: `[NEEDS CLARIFICATION]` 마커는 최대 3개로 제한합니다. 다음의 중요한 결정 사항에만 사용하십시오:
   - 기능 범위나 사용자 경험에 중대한 영향을 주는 경우
   - 서로 다른 결과를 초래하는 합리적인 해석이 여러 개 있는 경우
   - 합리적인 기본값이 없는 경우
4. **명확화 우선순위**: 범위 > 보안/개인정보 > 사용자 경험 > 기술 세부 사항
5. **테스터처럼 생각하기**: 모호한 모든 요구사항은 체크리스트의 "테스트 가능하고 모호하지 않음" 항목에서 실패해야 합니다.
6. **명확화가 자주 필요한 영역** (합리적인 기본값이 없는 경우에만):
   - 기능 범위 및 경계 (특정 유스케이스 포함/제외)
   - 사용자 유형 및 권한 (상충하는 해석이 가능한 경우)
   - 보안/컴플라이언스 요구사항 (법적/재정적으로 중요한 경우)

**합리적인 기본값 예시** (질문하지 마십시오):

- 데이터 보존: 해당 도메인의 업계 표준 관행
- 성능 목표: 특별히 명시되지 않는 한 일반적인 웹/모바일 앱 기대치
- 에러 처리: 적절한 폴백이 포함된 사용자 친화적 메시지
- 인증 방법: 웹 앱의 경우 일반적인 세션 기반 또는 OAuth2
- 통합 패턴: 프로젝트에 적합한 패턴 사용 (웹 서비스의 경우 REST/GraphQL, 라이브러리의 경우 함수 호출, 도구의 경우 CLI 인자 등)

### 성공 기준 가이드라인

성공 기준은 다음과 같아야 합니다:

1. **측정 가능**: 구체적인 메트릭(시간, 백분율, 횟수, 비율 등) 포함
2. **기술 비의존적**: 프레임워크, 언어, 데이터베이스 또는 도구 언급 금지
3. **사용자 중심**: 시스템 내부가 아닌 사용자/비즈니스 관점에서의 결과 설명
4. **검증 가능**: 구현 세부 사항을 몰라도 테스트/검증 가능

**좋은 예시**:
- "사용자가 3분 이내에 결제를 완료할 수 있음"
- "시스템이 10,000명의 동시 사용자를 지원함"
- "검색의 95%가 1초 이내에 결과를 반환함"
- "작업 완료율이 40% 향상됨"

**나쁜 예시** (구현 중심):
- "API 응답 시간이 200ms 미만임" (너무 기술적임. "사용자가 결과를 즉시 확인할 수 있음" 사용)
- "데이터베이스가 1000 TPS를 처리함" (구현 세부 사항. 사용자 중심 메트릭 사용)
- "React 컴포넌트가 효율적으로 렌더링됨" (프레임워크 종속적)
- "Redis 캐시 히트율이 80% 이상임" (기술 종속적)
